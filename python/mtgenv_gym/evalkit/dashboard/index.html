<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf7ef" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14172a" media="(prefers-color-scheme: dark)">
<title>mtgenv · training</title>
<script>
/* Stamp the saved theme before first paint (same pattern as the game client). */
(function () {
  var t = new URLSearchParams(location.search).get("theme") || localStorage.getItem("evaldash.theme");
  if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
})();
</script>
<style>
/* ══ evaldash — same CMYK-misregistration identity as the game client ══════════════ */
:root {
  --cyan:#29b6d8; --magenta:#ec4f9d; --yellow:#f5c528; --green:#37a86a;
  --paper:#faf7ef; --panel:#fffdf6; --surface:#f1ead9; --ink:#232a4d; --muted:#5c6187;
  --line:#232a4d; --hair:rgba(35,42,77,.20); --shadowc:var(--cyan);
  /* categorical run palette — validated (dataviz six-checks) for the light surface */
  --s0:#0f7fbf; --s1:#c94f2e; --s2:#8250c4; --s3:#2e8540;
  --s4:#b3266e; --s5:#946200; --s6:#3b5bdb; --s7:#00997f;
  --condensed:"Avenir Next Condensed","Avenir Next",Futura,"Trebuchet MS",system-ui,sans-serif;
}
:root[data-theme="dark"] {
  --paper:#14172a; --panel:#1d2138; --surface:#191d31; --ink:#e9e3d4; --muted:#a29d8b;
  --line:#e9e3d4; --hair:rgba(233,227,212,.18);
  --s0:#3f9ad0; --s1:#e06a42; --s2:#9a6fd8; --s3:#46a45c;
  --s4:#d4508f; --s5:#b3831a; --s6:#6f83e8; --s7:#10a78d;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]):not([data-theme="dark"]) {
    --paper:#14172a; --panel:#1d2138; --surface:#191d31; --ink:#e9e3d4; --muted:#a29d8b;
    --line:#e9e3d4; --hair:rgba(233,227,212,.18);
    --s0:#3f9ad0; --s1:#e06a42; --s2:#9a6fd8; --s3:#46a45c;
    --s4:#d4508f; --s5:#b3831a; --s6:#6f83e8; --s7:#10a78d;
  }
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }
html { touch-action: manipulation; }
body {
  margin: 0; background: var(--paper); color: var(--ink);
  font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}
a { color: inherit; }

/* ── top bar ── */
.topbar {
  position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: var(--paper); border-bottom: 2.5px solid var(--line);
}
.topbar h1 {
  margin: 0; font-family: var(--condensed); font-size: 19px; letter-spacing: .04em;
  text-transform: uppercase; white-space: nowrap;
}
.topbar h1 .spot { color: var(--cyan); }
.topbar .sub { color: var(--muted); font-size: 12px; white-space: nowrap; }
.topbar .grow { flex: 1; }
.iconbtn {
  min-width: 40px; min-height: 36px; padding: 4px 10px; cursor: pointer;
  background: var(--panel); color: var(--ink); border: 2.5px solid var(--line);
  border-radius: 7px 5px 8px 5px; box-shadow: 2px 2px 0 var(--shadowc);
  font: inherit; font-weight: 700;
}
.iconbtn:active { transform: translate(2px, 2px); box-shadow: none; }
a.iconbtn { text-decoration: none; display: inline-flex; align-items: center; }

/* ── layout: run picker on top (phone) / left pane (wide), charts after ── */
.wrap { display: grid; gap: 12px; padding: 12px; max-width: 1500px; margin: 0 auto; }
@media (min-width: 1000px) { .wrap { grid-template-columns: 320px minmax(0, 1fr); align-items: start; } }
#ratingsPage { grid-column: 1 / -1; max-width: 820px; }
@media (max-width: 560px) { .topbar .sub { display: none; } .topbar h1 { font-size: 16px; } }

/* ── runs pane ── */
.runs { display: flex; flex-direction: column; gap: 8px; }
@media (min-width: 1000px) { .runs { position: sticky; top: 62px; max-height: calc(100vh - 74px); overflow-y: auto; } }
details.section {
  background: var(--panel); border: 2.5px solid var(--line); border-radius: 8px 5px 7px 6px;
  box-shadow: 3px 3px 0 var(--shadowc);
}
details.section > summary {
  cursor: pointer; list-style: none; display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; font-family: var(--condensed); font-size: 15px; letter-spacing: .05em;
  text-transform: uppercase; user-select: none; min-height: 40px;
}
details.section > summary::-webkit-details-marker { display: none; }
details.section > summary::before { content: "▸"; color: var(--magenta); transition: transform .12s; }
details.section[open] > summary::before { transform: rotate(90deg); }
details.section > summary .count { margin-left: auto; color: var(--muted); font-size: 12px; font-family: ui-sans-serif, system-ui, sans-serif; text-transform: none; letter-spacing: 0; }
.runrow { border-top: 1.5px solid var(--hair); }
.runrow .rowline { display: flex; align-items: center; gap: 8px; padding: 8px 12px; min-height: 42px; }
.runrow input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--cyan); flex: none; }
.runrow .name { font-weight: 600; font-size: 13px; word-break: break-all; flex: 1; cursor: pointer; }
.runrow .step { margin-left: auto; color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; white-space: nowrap; }
.runrow .replaylink {
  flex: none; text-decoration: none; color: var(--magenta); font-size: 11.5px; font-weight: 700;
  padding: 4px 6px; border-radius: 6px; white-space: nowrap;
}
.runrow .replaylink:hover { background: var(--surface); }
.runrow .infobtn {
  flex: none; border: none; background: none; color: var(--muted); cursor: pointer;
  font-size: 15px; min-width: 34px; min-height: 34px; border-radius: 6px;
}
.runrow .infobtn:hover, .runrow .infobtn[aria-expanded="true"] { color: var(--ink); background: var(--surface); }
.grouptoggle {
  border: 1.5px solid var(--hair); background: none; color: var(--muted); cursor: pointer;
  font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 99px; min-height: 26px;
}
.grouptoggle:hover { color: var(--ink); border-color: var(--ink); }
/* Live indicator: this run is writing metrics right now / tournament appending games. */
.livedot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); flex: none;
  box-shadow: 0 0 0 0 var(--green); animation: livepulse 1.6s ease-out infinite; }
@keyframes livepulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--green) 60%, transparent); }
  100% { box-shadow: 0 0 0 8px transparent; } }
@media (prefers-reduced-motion: reduce) { .livedot { animation: none; } }
.livetag { color: var(--green); font-size: 10.5px; font-weight: 800; letter-spacing: .05em;
  text-transform: uppercase; display: inline-flex; align-items: center; gap: 5px; }
.desc {
  margin: 0 12px 10px; padding: 8px 10px; background: var(--surface);
  border-left: 3px solid var(--yellow); border-radius: 4px; font-size: 12.5px; overflow-x: auto;
}
.desc :is(h1,h2,h3,h4) { margin: 4px 0; font-size: 13px; font-family: var(--condensed); letter-spacing: .04em; text-transform: uppercase; }
.desc p { margin: 5px 0; }
.desc code { background: var(--paper); padding: 0 4px; border-radius: 3px; font-size: 11.5px; }
.desc a { color: var(--cyan); }
.desc table { border-collapse: collapse; margin: 5px 0; font-size: 11.5px; }
.desc td, .desc th { border: 1px solid var(--hair); padding: 2px 7px; text-align: left; }
.desc th { font-weight: 700; }

/* ── charts pane ── */
.main { min-width: 0; display: flex; flex-direction: column; gap: 12px; }
.controls {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; padding: 9px 12px;
  background: var(--panel); border: 2.5px solid var(--line); border-radius: 6px 8px 5px 7px;
  box-shadow: 3px 3px 0 var(--magenta);
}
.controls label { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); min-height: 30px; }
.controls input[type="range"] { width: 110px; accent-color: var(--cyan); }
.controls input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--cyan); }
.legend { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; cursor: pointer;
  border: 1.5px solid var(--hair); border-radius: 99px; background: var(--panel);
  font-size: 12px; font-weight: 600; min-height: 30px; user-select: none;
}
.chip .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
.chip.off { opacity: .38; text-decoration: line-through; }
.chartcol { display: flex; flex-direction: column; gap: 6px; }
.chartsec > summary {
  cursor: pointer; list-style: none; display: flex; align-items: baseline; gap: 8px;
  font-family: var(--condensed); font-size: 14.5px; letter-spacing: .06em; text-transform: uppercase;
  color: var(--muted); padding: 6px 2px; user-select: none; min-height: 34px;
}
.chartsec > summary::-webkit-details-marker { display: none; }
.chartsec > summary::before { content: "▸"; color: var(--cyan); transition: transform .12s; }
.chartsec[open] > summary::before { transform: rotate(90deg); }
.chartsec > summary .n { font-size: 11px; font-family: ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
.chartsec .grid { margin-bottom: 8px; }
.grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
@media (min-width: 700px) { .grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); } }

/* ── hamburger drawer ── */
.backdrop { position: fixed; inset: 0; z-index: 90; background: rgba(15,17,30,.45); }
.drawer {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 95; width: 230px; padding: 14px 12px;
  background: var(--panel); border-right: 3px solid var(--line); box-shadow: 6px 0 0 var(--cyan);
  display: flex; flex-direction: column; gap: 8px;
}
.drawer-item {
  text-align: left; background: var(--surface); color: var(--ink); border: 2px solid var(--line);
  border-radius: 7px 4px 7px 5px; padding: 12px 14px; font: inherit; font-weight: 700;
  font-size: 14px; cursor: pointer; min-height: 46px;
}
.drawer-item.active { background: var(--cyan); color: #08202a; }
.drawer-item:active { transform: translate(1px,1px); }

/* ── ratings page: env/version tabs + BT/Elo leaderboard with descriptions ── */
.elotable {
  background: var(--panel); border: 2.5px solid var(--line); border-radius: 7px 5px 8px 6px;
  box-shadow: 3px 3px 0 var(--yellow); padding: 4px 0; overflow-x: auto;
}
.elotable .erow {
  display: flex; align-items: baseline; gap: 10px; padding: 8px 14px; min-height: 38px;
  border-top: 1.5px solid var(--hair); font-size: 13px;
}
.elotable .erow:first-child { border-top: none; }
.elotable .erank { color: var(--muted); min-width: 20px; font-variant-numeric: tabular-nums; }
.elotable .ename { font-weight: 700; flex: 1; overflow-wrap: anywhere; }
.elotable .ename.trained { color: var(--magenta); }
.elotable .erating { font-weight: 800; font-variant-numeric: tabular-nums; min-width: 52px; text-align: right; }
.elotable .eci { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; min-width: 92px; text-align: right; }
.elotable .egames { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; min-width: 46px; text-align: right; }
.elotable .eempty { padding: 12px 14px; color: var(--muted); font-size: 12.5px; }

/* ── replays panel: run tabs (newest first) + that run's replay list ── */
.rtabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 2px 0 8px; }
.rtabs .chip.active { background: var(--cyan); color: #08202a; border-color: var(--ink); }
.rlist {
  background: var(--panel); border: 2.5px solid var(--line); border-radius: 7px 5px 8px 6px;
  box-shadow: 3px 3px 0 var(--shadowc); padding: 4px 0; max-height: 320px; overflow-y: auto;
}
.rlist a {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px; min-height: 42px;
  text-decoration: none; border-top: 1.5px solid var(--hair); font-size: 13px;
}
.rlist a:first-child { border-top: none; }
.rlist a:hover { background: var(--surface); }
.rlist .rstep { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 90px; }
.rlist .rwhen { color: var(--muted); font-size: 11.5px; margin-left: auto; font-variant-numeric: tabular-nums; }
.rlist .rplay { color: var(--magenta); font-weight: 800; }
.rlist .rempty { padding: 12px 14px; color: var(--muted); font-size: 12.5px; }
.card {
  background: var(--panel); border: 2.5px solid var(--line); border-radius: 7px 5px 8px 6px;
  box-shadow: 3px 3px 0 var(--shadowc); padding: 8px 10px 6px; min-width: 0;
}
.card h3 {
  margin: 0 0 2px; font-size: 12.5px; font-weight: 700; color: var(--muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card .plot { position: relative; height: 205px; }
.empty { padding: 30px 16px; text-align: center; color: var(--muted); }
.footer { padding: 4px 12px 18px; color: var(--muted); font-size: 11.5px; text-align: center; }
</style>
</head>
<body>
<header class="topbar">
  <button class="iconbtn" id="menuBtn" title="menu">☰</button>
  <h1>mtgenv <span class="spot">·</span> <span id="viewTitle">training</span></h1>
  <span class="sub" id="synced"></span>
  <span class="grow"></span>
  <a class="iconbtn" id="lobbylink" title="game lobby (replays)">▶ lobby</a>
  <button class="iconbtn" id="themebtn" title="theme">◐</button>
</header>
<div class="backdrop" id="backdrop" hidden></div>
<nav class="drawer" id="drawer" hidden>
  <button class="drawer-item" data-view="metrics">📈 Metrics</button>
  <button class="drawer-item" data-view="ratings">🏆 Ratings</button>
</nav>

<div class="wrap">
  <aside class="runs" id="runs"></aside>
  <main class="main">
    <div class="controls">
      <div class="legend" id="legend"></div>
      <span style="flex:1"></span>
      <label>smooth <input type="range" id="smooth" min="0" max="0.9" step="0.05" value="0">
        <span id="smoothval" style="font-variant-numeric:tabular-nums">off</span></label>
      <label><input type="checkbox" id="ratelock" checked> rates 0–1</label>
      <label><input type="checkbox" id="allmetrics"> all metrics</label>
    </div>
    <details class="chartsec" id="replaysec" open>
      <summary>replays<span class="n" id="replayCount"></span></summary>
      <div class="rtabs" id="replayTabs"></div>
      <div class="rlist" id="replayList"></div>
    </details>
    <div class="chartcol" id="charts"></div>
    <div class="empty" id="empty" hidden>No runs selected — pick some from the run list.</div>
  </main>
  <section class="main" id="ratingsPage" hidden>
    <div class="rtabs" id="eloTabs"></div>
    <div class="elotable" id="eloTable"></div>
  </section>
</div>

<script src="/chart.umd.min.js"></script>
<script>
"use strict";
/* Self-hosted tool: surface failures on the page instead of a silent blank. */
window.addEventListener("error", (e) => {
  const el = document.getElementById("empty");
  if (el) { el.hidden = false; el.textContent = `error: ${e.message} (${(e.filename || "").split("/").pop()}:${e.lineno})`; }
});
window.addEventListener("unhandledrejection", (e) => {
  const el = document.getElementById("empty");
  if (el) { el.hidden = false; el.textContent = "error: " + (e.reason && e.reason.message || e.reason); }
});
/* ══ state ═══════════════════════════════════════════════════════════════════════ */
const LS = {
  get(k, d) { try { const v = JSON.parse(localStorage.getItem("evaldash." + k)); return v === null ? d : v; } catch { return d; } },
  set(k, v) { localStorage.setItem("evaldash." + k, JSON.stringify(v)); },
};
/* Sections = major versions, newest first (numbers carry chronology); then reference, then misc. */
function sectionRank(exp) {
  const m = exp.match(/^(\d+)\.x$/);
  if (m) return 1000 - parseInt(m[1], 10);
  return exp === "reference" ? 2000 : 3000;
}
let index = null;                      // /data/index.json payload
let entryByName = {};                  // run name -> index entry
let selected = LS.get("sel", null);    // run names (null until defaulted from index)
let colorOf = LS.get("colors", {});    // run name -> palette slot (stable while selected)
let hiddenRuns = new Set();            // legend-toggled off (session only)
const runData = {};                    // name -> metrics payload
let charts = [];                       // live Chart.js instances
let paneSig = "";                      // run-set signature the pane was built for
const rowByName = {};                  // run name -> {cb, step, replay} for in-place updates

/* ══ helpers ═════════════════════════════════════════════════════════════════════ */
const $ = (id) => document.getElementById(id);
const css = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const PALETTE_VARS = ["--s0","--s1","--s2","--s3","--s4","--s5","--s6","--s7"];
const kfmt = (v) => Math.abs(v) >= 1e6 ? (v / 1e6) + "M" : Math.abs(v) >= 1000 ? (v / 1000) + "k" : "" + v;

function assignColor(name) {
  if (colorOf[name] !== undefined) return colorOf[name];
  const used = new Set(Object.entries(colorOf).filter(([n]) => selected.includes(n)).map(([, i]) => i));
  let slot = 0; while (used.has(slot) && slot < PALETTE_VARS.length - 1) slot++;
  colorOf[name] = slot; LS.set("colors", colorOf);
  return slot;
}
const runColor = (name) => css(PALETTE_VARS[colorOf[name] % PALETTE_VARS.length]);

/* metric ordering: curated first, long tail behind the "all metrics" toggle */
function tagOrder(t) {
  const exact = {
    "selfplay/winrate_vs_random": 0, "selfplay/winrate_vs_random_sampled": 1,
    "selfplay/winrate_vs_script": 2, "selfplay/winrate_vs_script_sampled": 3,   // vs the scripted optimal — ~0.5 = learned
    "selfplay/winrate_vs_initial": 4, "selfplay/winrate_vs_initial_sampled": 5,
    "stats/productive_rate": 20, "stats/attack_rate": 21, "stats/block_rate": 22,
    "stats/cast_rate": 23, "stats/playland_rate": 24, "stats/block_double_rate": 25,
    "game/turns_mean": 30, "train/shaping_coef": 50,
  };
  if (t in exact) return exact[t];
  if (t.startsWith("ladder/")) return 10;
  if (t.startsWith("game/end_")) return 31;
  if (t.startsWith("swine/")) return 40;          // per-deck analyzers
  return 100;                                      // internals / rollout / everything else
}
const isRateTag = (t) => t.includes("winrate") || t.endsWith("_rate") || t.includes("/end_") || t.startsWith("ladder/");

function ema(points, a) {
  if (!a) return points;
  let prev = null;
  return points.map(([x, y]) => {
    prev = prev === null ? y : a * prev + (1 - a) * y;
    return [x, prev];
  });
}

/* minimal, escaped markdown: headings/bold/code/links/bullets/tables */
function md(text) {
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = (s) => esc(s)
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|\s)(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  const out = []; let table = null, list = null;
  const flush = () => {
    if (table) { out.push("<table>" + table.map(r => "<tr>" + r.map(c => "<td>" + inline(c) + "</td>").join("") + "</tr>").join("") + "</table>"); table = null; }
    if (list) { out.push("<ul>" + list.map(li => "<li>" + inline(li) + "</li>").join("") + "</ul>"); list = null; }
  };
  for (const raw of (text || "").split("\n")) {
    const line = raw.trimEnd();
    if (/^\|.*\|$/.test(line.trim())) {
      const cells = line.trim().slice(1, -1).split("|").map(c => c.trim());
      if (cells.every(c => /^:?-{2,}:?$/.test(c))) continue;         // separator row
      (table = table || []).push(cells); continue;
    }
    if (/^[-*] /.test(line.trim())) { flush(); (list = list || []).push(line.trim().slice(2)); continue; }
    flush();
    const h = line.match(/^(#{1,4}) +(.*)/);
    if (h) out.push("<h4>" + inline(h[2]) + "</h4>");
    else if (line.trim()) out.push("<p>" + inline(line) + "</p>");
  }
  flush();
  return out.join("");
}

/* ══ runs pane — built ONCE per run set; selection/steps update in place so rapid
      multi-selecting is never interrupted by a rebuild ═══════════════════════════ */
const lobbyBase = () => `http://${location.hostname}:8080`;
const replayHref = (e) => e.latest_replay
  ? `${lobbyBase()}/play?replay=${encodeURIComponent(e.latest_replay)}` : null;

function buildRunsPane() {
  const bySection = {};
  for (const r of index.runs) (bySection[r.experiment] = bySection[r.experiment] || []).push(r);
  const root = $("runs");
  root.textContent = "";
  Object.keys(rowByName).forEach(k => delete rowByName[k]);
  const sections = Object.keys(bySection).sort((a, b) => sectionRank(a) - sectionRank(b));
  for (const sec of sections) {
    const runs = bySection[sec].slice().sort((a, b) => b.name.localeCompare(a.name, undefined, { numeric: true }));
    const det = document.createElement("details");
    det.className = "section";
    det.open = runs.some(r => selected.includes(r.name));
    det.dataset.section = sec;
    const sum = document.createElement("summary");
    sum.innerHTML = `${sec}<span class="count"></span>`;
    const tog = document.createElement("button");
    tog.className = "grouptoggle";
    tog.textContent = "all";
    tog.title = "select / deselect every run in this group";
    tog.addEventListener("click", (e) => {
      e.preventDefault(); e.stopPropagation();   // don't collapse the <details>
      const allOn = runs.every(r => selected.includes(r.name));
      for (const r of runs) {
        if (allOn) selected = selected.filter(n => n !== r.name);
        else if (!selected.includes(r.name)) { selected.push(r.name); assignColor(r.name); }
        if (rowByName[r.name]) rowByName[r.name].cb.checked = !allOn;
      }
      selectionChanged();
    });
    sum.insertBefore(tog, sum.querySelector(".count"));
    det.appendChild(sum);
    for (const r of runs) {
      const row = document.createElement("div");
      row.className = "runrow";
      const cbid = "cb-" + r.name.replace(/[^a-zA-Z0-9_-]/g, "_");
      row.innerHTML =
        `<div class="rowline">
           <input type="checkbox" id="${cbid}" ${selected.includes(r.name) ? "checked" : ""}>
           <label class="name" for="${cbid}">${r.name}</label>
           <span class="livedot" title="training right now" hidden></span>
           <a class="replaylink" target="_blank" rel="noopener" title="watch this run's latest replay" hidden></a>
           <span class="step"></span>
           ${r.description ? `<button class="infobtn" aria-expanded="false" title="notes">ⓘ</button>` : ""}
         </div>
         ${r.description ? `<div class="desc" hidden>${md(r.description)}</div>` : ""}`;
      const cb = row.querySelector("input");
      cb.addEventListener("change", () => {
        if (cb.checked) { if (!selected.includes(r.name)) { selected.push(r.name); assignColor(r.name); } }
        else selected = selected.filter(n => n !== r.name);
        selectionChanged();
      });
      const info = row.querySelector(".infobtn");
      if (info) info.addEventListener("click", (e) => {
        e.preventDefault();
        const d = row.querySelector(".desc");
        d.hidden = !d.hidden;
        info.setAttribute("aria-expanded", String(!d.hidden));
      });
      rowByName[r.name] = { cb, step: row.querySelector(".step"), replay: row.querySelector(".replaylink"),
                            live: row.querySelector(".livedot") };
      det.appendChild(row);
    }
    root.appendChild(det);
  }
  updateRunsPane();
}

function updateRunsPane() {
  for (const r of index.runs) {
    const row = rowByName[r.name];
    if (!row) continue;
    row.step.textContent = kfmt(r.max_step);
    row.live.hidden = !r.live;
    const href = replayHref(r);
    row.replay.hidden = !href;
    if (href) { row.replay.href = href; row.replay.textContent = `▶ ${r.replays}`; }
  }
  for (const det of document.querySelectorAll("details.section")) {
    const names = index.runs.filter(r => r.experiment === det.dataset.section).map(r => r.name);
    const nsel = names.filter(n => selected.includes(n)).length;
    det.querySelector(".count").textContent = (nsel ? nsel + " of " : "") + names.length;
  }
}

/* Selection changes apply instantly to chips/counts; data fetch + chart rebuild is
   debounced so ticking many boxes in a row costs one rebuild, not one per click. */
let applyTimer = null;
function selectionChanged() {
  LS.set("sel", selected);
  updateRunsPane();
  renderLegend();
  renderReplays();   // replay tabs track the selection
  clearTimeout(applyTimer);
  applyTimer = setTimeout(async () => { await loadSelected(); renderCharts(); }, 350);
}

/* ══ legend ══════════════════════════════════════════════════════════════════════ */
function renderLegend() {
  const el = $("legend");
  el.textContent = "";
  for (const name of selected) {
    const chip = document.createElement("span");
    chip.className = "chip" + (hiddenRuns.has(name) ? " off" : "");
    chip.innerHTML = `<span class="dot" style="background:${runColor(name)}"></span>${name}`;
    chip.addEventListener("click", () => {
      hiddenRuns.has(name) ? hiddenRuns.delete(name) : hiddenRuns.add(name);
      renderLegend(); renderCharts();
    });
    el.appendChild(chip);
  }
}

/* ══ charts ══════════════════════════════════════════════════════════════════════ */
function renderCharts() {
  charts.forEach(c => c.destroy()); charts = [];
  const grid = $("charts");
  grid.textContent = "";
  const visible = selected.filter(n => !hiddenRuns.has(n) && runData[n]);
  $("empty").hidden = selected.length > 0;
  if (!visible.length) return;

  const showAll = $("allmetrics").checked;
  const tags = [...new Set(visible.flatMap(n => Object.keys(runData[n].metrics)))]
    .filter(t => showAll || tagOrder(t) < 100)
    .sort((a, b) => tagOrder(a) - tagOrder(b) || a.localeCompare(b));
  const a = parseFloat($("smooth").value);
  const lockRates = $("ratelock").checked;
  const ink = css("--ink"), mutedC = css("--muted"), hair = css("--hair"), panel = css("--panel");

  // Collapsible groups by tag prefix (selfplay/, stats/, game/, …); open state persists.
  const groups = {};
  for (const tag of tags) {
    const g = tag.includes("/") ? tag.split("/")[0] : "other";
    (groups[g] = groups[g] || []).push(tag);
  }
  const secOpen = LS.get("secopen", {});
  const groupOrder = Object.keys(groups)
    .sort((x, y) => Math.min(...groups[x].map(tagOrder)) - Math.min(...groups[y].map(tagOrder)));
  for (const g of groupOrder) {
    const det = document.createElement("details");
    det.className = "chartsec";
    det.open = secOpen[g] !== false;   // default open
    det.innerHTML = `<summary>${g}<span class="n">${groups[g].length}</span></summary><div class="grid"></div>`;
    det.addEventListener("toggle", () => {
      const m = LS.get("secopen", {}); m[g] = det.open; LS.set("secopen", m);
    });
    grid.appendChild(det);
    renderGroup(det.querySelector(".grid"), groups[g], visible, a, lockRates, { ink, mutedC, hair, panel });
  }
}

function renderGroup(grid, tags, visible, a, lockRates, theme) {
  const { ink, mutedC, hair, panel } = theme;
  for (const tag of tags) {
    const datasets = [];
    for (const name of visible) {
      const pts = runData[name].metrics[tag];
      if (!pts) continue;
      datasets.push({
        label: name,
        data: ema(pts, a).map(([x, y]) => ({ x, y })),
        borderColor: runColor(name), backgroundColor: runColor(name),
        borderWidth: 2, pointHitRadius: 12, tension: 0, spanGaps: true,
        pointRadius: pts.length < 3 ? 3.5 : 0,   // one-shot evals (verification runs) must stay visible
      });
    }
    if (!datasets.length) continue;
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h3>${tag}</h3><div class="plot"><canvas></canvas></div>`;
    grid.appendChild(card);
    const rate = lockRates && isRateTag(tag);
    charts.push(new Chart(card.querySelector("canvas"), {
      type: "line",
      data: { datasets },
      options: {
        animation: false, responsive: true, maintainAspectRatio: false, normalized: true,
        interaction: { mode: "nearest", axis: "x", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: panel, titleColor: mutedC, bodyColor: ink, borderColor: ink,
            borderWidth: 1.5, cornerRadius: 6, padding: 8,
            callbacks: {
              title: (items) => items.length ? "step " + kfmt(items[0].parsed.x) : "",
              label: (item) => ` ${item.dataset.label}: ${item.parsed.y.toFixed(3)}`,
            },
          },
        },
        scales: {
          x: { type: "linear", grid: { color: hair }, border: { color: ink },
               ticks: { color: mutedC, maxTicksLimit: 6, callback: kfmt, font: { size: 10.5 } } },
          y: { grid: { color: hair }, border: { color: ink },
               ticks: { color: mutedC, maxTicksLimit: 6, font: { size: 10.5 } },
               ...(rate ? { min: 0, max: 1 } : {}) },
        },
      },
    }));
  }
}

/* ══ ratings page — BT/Elo leaderboards per environment (versioned) ═══════════════
   Payload shapes supported: flat {agents:…} (pre-versioning) or {current:N, versions:{N:{agents:…}}}.
   Defaults to the env's CURRENT version; older versions selectable but visually marked. */
function eloVersions(entry) {
  if (entry.versions) return { current: String(entry.current), versions: entry.versions };
  return { current: "1", versions: { "1": entry } };   // legacy flat shape
}

function agentDescription(name, a) {
  // Registry notes + (for trained agents) the matching run's full description.
  const parts = [];
  if (a.notes) parts.push(a.notes);
  const run = index.runs.find(r => r.name.startsWith(name));
  if (run && run.description) parts.push(run.description);
  return parts.join("\n\n---\n\n");
}

function renderElo() {
  const elo = index.elo || {};
  const envs = Object.keys(elo);
  const tabs = $("eloTabs");
  tabs.textContent = "";
  if (!envs.length) {
    $("eloTable").innerHTML = '<div class="eempty">No rating tables yet — run a tournament.</div>';
    return;
  }
  let activeEnv = LS.get("elotab", null);
  if (!envs.includes(activeEnv)) activeEnv = envs[0];
  const { current, versions } = eloVersions(elo[activeEnv]);
  const vkeys = Object.keys(versions).sort((a, b) => (+b) - (+a));
  let activeV = LS.get("elover." + activeEnv, current);
  if (!vkeys.includes(activeV)) activeV = current;

  for (const e of envs) {
    const chip = document.createElement("span");
    chip.className = "chip" + (e === activeEnv ? " active" : "");
    chip.textContent = e;
    if (elo[e].active) chip.innerHTML += ' <span class="livedot" title="tournament running"></span>';
    chip.addEventListener("click", () => { LS.set("elotab", e); renderElo(); });
    tabs.appendChild(chip);
  }
  // Version selector — always visible so the versioning model is discoverable even at v1.
  const sep = document.createElement("span");
  sep.style.cssText = "flex-basis:100%;height:0";
  tabs.appendChild(sep);
  for (const v of vkeys) {
    const chip = document.createElement("span");
    chip.className = "chip" + (v === activeV ? " active" : "");
    chip.textContent = "v" + v + (v === current ? " (current)" : "");
    chip.addEventListener("click", () => { LS.set("elover." + activeEnv, v); renderElo(); });
    tabs.appendChild(chip);
  }
  if (elo[activeEnv].active) {
    const t = document.createElement("span");
    t.className = "livetag";
    t.innerHTML = '<span class="livedot"></span> tournament in progress — table updating';
    tabs.appendChild(t);
  }

  const tab = versions[activeV] || { agents: {} };
  const box = $("eloTable");
  box.textContent = "";
  if (activeV !== current) {
    const warn = document.createElement("div");
    warn.className = "eempty";
    warn.textContent = `⚠ historical table (v${activeV}) — env contract has changed since; not comparable to current`;
    box.appendChild(warn);
  }
  const rows = Object.entries(tab.agents || {}).sort((x, y) => y[1].rating - x[1].rating);
  if (!rows.length) box.innerHTML += '<div class="eempty">Empty table.</div>';
  rows.forEach(([name, a], i) => {
    const row = document.createElement("div");
    const trained = !name.startsWith("script") && name !== "random";
    const desc = agentDescription(name, a);
    row.innerHTML =
      `<div class="erow">
         <span class="erank">${i + 1}</span>
         <span class="ename${trained ? " trained" : ""}">${name}</span>
         <span class="erating">${Math.round(a.rating)}</span>
         <span class="eci">[${Math.round(a.ci_lo)}, ${Math.round(a.ci_hi)}]</span>
         <span class="egames">${a.games}g</span>
         ${desc ? '<button class="infobtn" aria-expanded="false" title="about this agent">ⓘ</button>' : ""}
       </div>
       ${desc ? `<div class="desc" hidden>${md(desc)}</div>` : ""}`;
    const info = row.querySelector(".infobtn");
    if (info) info.addEventListener("click", () => {
      const d = row.querySelector(".desc");
      d.hidden = !d.hidden;
      info.setAttribute("aria-expanded", String(!d.hidden));
    });
    box.appendChild(row);
  });
}

/* ══ view routing — hamburger drawer, metrics vs ratings pages ════════════════════ */
function showView(v) {
  const ratings = v === "ratings";
  document.querySelector("main.main").hidden = ratings;
  $("runs").hidden = ratings;
  $("ratingsPage").hidden = !ratings;
  $("viewTitle").textContent = ratings ? "ratings" : "training";
  document.querySelectorAll(".drawer-item").forEach(b =>
    b.classList.toggle("active", b.dataset.view === v));
  LS.set("view", v);
  if (location.hash !== "#/" + v) history.replaceState(null, "", "#/" + v);
  closeDrawer();
}
function openDrawer() { $("drawer").hidden = false; $("backdrop").hidden = false; }
function closeDrawer() { $("drawer").hidden = true; $("backdrop").hidden = true; }
$("menuBtn").addEventListener("click", openDrawer);
$("backdrop").addEventListener("click", closeDrawer);
document.querySelectorAll(".drawer-item").forEach(b =>
  b.addEventListener("click", () => showView(b.dataset.view)));

/* ══ replays panel — tabs by run (newest first), rows link straight into the lobby player ══ */
function renderReplays() {
  // Only the runs SELECTED in the picker; latest versioned first, non-versioned at the end.
  const vkey = (n) => { const m = n.match(/^(\d+)\.(\d+)/); return m ? (+m[1]) * 1000 + (+m[2]) : -1; };
  const withReplays = index.runs.filter(r => selected.includes(r.name) && (r.replays || 0) > 0)
    .sort((a, b) => vkey(b.name) - vkey(a.name) || a.name.localeCompare(b.name));
  $("replayCount").textContent = withReplays.reduce((s, r) => s + r.replays, 0);
  const tabs = $("replayTabs");
  tabs.textContent = "";
  if (!withReplays.length) { $("replayList").innerHTML = '<div class="rempty">No replays for the selected runs.</div>'; return; }
  let active = LS.get("replaytab", null);
  if (!withReplays.some(r => r.name === active)) active = withReplays[0].name;
  for (const r of withReplays) {
    const chip = document.createElement("span");
    chip.className = "chip" + (r.name === active ? " active" : "");
    chip.textContent = `${r.name} (${r.replays})`;
    chip.addEventListener("click", () => { LS.set("replaytab", r.name); renderReplays(); });
    tabs.appendChild(chip);
  }
  const run = withReplays.find(r => r.name === active);
  const list = $("replayList");
  list.textContent = "";
  for (const rep of (run.replay_list || []).slice().reverse()) {   // newest replay first
    const a = document.createElement("a");
    a.href = `${lobbyBase()}/play?replay=${encodeURIComponent(rep.id)}`;
    a.target = "_blank"; a.rel = "noopener";
    const when = rep.t ? new Date(rep.t).toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "";
    a.innerHTML = `<span class="rplay">▶</span><span class="rstep">${rep.step != null ? "step " + kfmt(rep.step) : "game"}</span><span class="rwhen">${when}</span>`;
    list.appendChild(a);
  }
  if (!list.childElementCount) list.innerHTML = '<div class="rempty">No replays for this run.</div>';
}

/* ══ data flow ═══════════════════════════════════════════════════════════════════ */
async function loadSelected() {
  await Promise.all(selected.filter(n => !runData[n]).map(async (n) => {
    try {
      const r = await fetch(`/data/runs/${encodeURIComponent(n)}.json`);
      if (r.ok) runData[n] = await r.json();
    } catch { /* run may have vanished; chip simply renders nothing */ }
  }));
}

async function refresh(force) {
  const r = await fetch("/data/index.json", { cache: "no-store" });
  const next = await r.json();
  const changed = !index || next.generated_at !== index.generated_at;
  index = next;
  entryByName = Object.fromEntries(index.runs.map(x => [x.name, x]));
  $("synced").textContent = "synced " + new Date(index.generated_at * 1000).toLocaleTimeString();
  if (selected === null) {   // first visit: the newest version era + the reference yardstick
    const majors = index.runs.map(x => x.experiment.match(/^(\d+)\.x$/)).filter(Boolean).map(m => +m[1]);
    const top = majors.length ? Math.max(...majors) + ".x" : null;
    selected = index.runs
      .filter(x => x.experiment === top && x.max_step >= 1000)
      .sort((x, y) => y.name.localeCompare(x.name, undefined, { numeric: true }))
      .slice(0, 6).map(x => x.name)
      .concat(index.runs.filter(x => x.experiment === "reference").map(x => x.name));
    selected.forEach(assignColor);
    LS.set("sel", selected);
  }
  selected = selected.filter(n => n in entryByName);
  const sig = index.runs.map(x => x.name).sort().join("|");
  if (sig !== paneSig) { paneSig = sig; buildRunsPane(); }   // run set changed: full pane build
  else updateRunsPane();                                     // else: in-place text updates only
  renderReplays();
  renderElo();
  if (changed || force) {
    for (const n of selected) delete runData[n];   // refetch: series may have grown
    await loadSelected();
    renderLegend(); renderCharts();
  }
}

/* ══ controls ════════════════════════════════════════════════════════════════════ */
$("smooth").value = LS.get("smooth", 0);
$("ratelock").checked = LS.get("ratelock", true);
$("allmetrics").checked = LS.get("allmetrics", false);
const smoothLabel = () => { const v = parseFloat($("smooth").value); $("smoothval").textContent = v ? v.toFixed(2) : "off"; };
smoothLabel();
$("smooth").addEventListener("input", () => { smoothLabel(); LS.set("smooth", parseFloat($("smooth").value)); renderCharts(); });
$("ratelock").addEventListener("change", () => { LS.set("ratelock", $("ratelock").checked); renderCharts(); });
$("allmetrics").addEventListener("change", () => { LS.set("allmetrics", $("allmetrics").checked); renderCharts(); });
$("themebtn").addEventListener("click", () => {
  const cur = document.documentElement.dataset.theme ||
    (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("evaldash.theme", next);
  renderLegend(); renderCharts();   // charts read CSS vars at build time
});
$("lobbylink").href = `http://${location.hostname}:8080/`;

showView((location.hash.match(/^#\/(ratings|metrics)/) || [])[1] || LS.get("view", "metrics"));
window.addEventListener("hashchange", () => {
  const v = (location.hash.match(/^#\/(ratings|metrics)/) || [])[1];
  if (v) showView(v);
});
refresh(true);
setInterval(() => refresh(false).catch(() => {}), 45_000);
// Mobile browsers suspend timers in background tabs — refresh immediately on return so the
// dashboard is never stale when you look at it.
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") refresh(false).catch(() => {});
});
</script>
