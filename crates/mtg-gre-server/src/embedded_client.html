<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mtgenv — web play</title>
<style>
  :root {
    --bg: #15171c; --panel: #1e2129; --panel2: #262a34; --ink: #e7e9ee;
    --muted: #8b93a7; --line: #333845; --accent: #5b8cff; --legal: #3ad07f;
    --legalbg: rgba(58,208,127,.12); --tap: #c7732f; --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header .status { color: var(--muted); font-size: 12px; }
  main { display: grid; grid-template-columns: 1fr 320px; gap: 12px; padding: 12px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
  .panel h2 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  .seat { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .seat .who { font-weight: 600; }
  .seat .you { color: var(--accent); }
  .stat { color: var(--muted); font-size: 12px; }
  .life { font-size: 20px; font-weight: 700; }
  .zone { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; min-height: 8px; }
  .card { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 8px; min-width: 78px; font-size: 12px; position: relative; user-select: none; }
  .card .nm { font-weight: 600; }
  .card .ty { color: var(--muted); font-size: 10px; }
  .card.land { border-left: 3px solid #6aa84f; }
  .card.tapped { transform: rotate(6deg); opacity: .7; }
  .card.legal { border-color: var(--legal); background: var(--legalbg); box-shadow: 0 0 0 1px var(--legal) inset; }
  .empty { color: var(--muted); font-style: italic; font-size: 12px; }
  #prompt { position: sticky; top: 12px; }
  #prompt .title { font-weight: 600; margin-bottom: 10px; }
  .opts { display: flex; flex-direction: column; gap: 6px; }
  button.opt { text-align: left; background: var(--panel2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; cursor: pointer; font: inherit; }
  button.opt:hover { border-color: var(--accent); }
  button.opt.sel { border-color: var(--legal); background: var(--legalbg); }
  .row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  button.act { background: var(--accent); color: #0b1020; border: none; border-radius: 8px;
    padding: 8px 14px; font-weight: 700; cursor: pointer; font: inherit; }
  button.pass { background: var(--panel2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 14px; cursor: pointer; font: inherit; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  input[type=number] { width: 90px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; font: inherit; }
  .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
  #log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    color: var(--muted); max-height: 240px; overflow: auto; white-space: pre-wrap; }
  .banner { padding: 10px; border-radius: 8px; background: var(--legalbg); border: 1px solid var(--legal);
    color: var(--legal); font-weight: 700; }
  .waiting { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>mtgenv</h1>
  <span class="status" id="conn">connecting…</span>
  <span class="status">lands-only demo · you are Player 0 · opponent = RandomAgent</span>
</header>
<main>
  <div class="col">
    <div class="panel" id="opp"></div>
    <div class="panel"><h2>Stack</h2><div class="zone" id="stack"></div></div>
    <div class="panel" id="me"></div>
  </div>
  <div class="col">
    <div class="panel" id="prompt"><div class="waiting">Waiting for the game to start…</div></div>
    <div class="panel"><h2>Log</h2><div id="log"></div></div>
  </div>
</main>
<script>
"use strict";
(function () {
  const $ = (id) => document.getElementById(id);
  let view = null;      // latest PlayerView
  let cur = null;       // current decide message {id, prompt, view}
  let multi = new Set();// selected indices for selectMany

  const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  ws.onopen = () => { $("conn").textContent = "connected"; };
  ws.onclose = () => { $("conn").textContent = "disconnected"; };
  ws.onerror = () => { $("conn").textContent = "connection error"; };
  ws.onmessage = (e) => handle(JSON.parse(e.data));

  function handle(m) {
    if (m.type === "event") { view = m.view; log(eventText(m.event)); render(); }
    else if (m.type === "decide") { view = m.view; cur = m; multi = new Set(); render(); renderPrompt(); }
    else if (m.type === "gameOver") { cur = null; renderEnd(m.winner); }
    else if (m.type === "log") { log(m.text); }
  }

  function send(payload) {
    if (!cur) return;
    ws.send(JSON.stringify(Object.assign({ type: "response", id: cur.id, picks: [], number: null, pass: false, order: [] }, payload)));
    cur = null; multi = new Set();
    $("prompt").innerHTML = '<div class="waiting">Waiting for the opponent…</div>';
    render();
  }

  // ── rendering ──────────────────────────────────────────────────────────
  function render() {
    if (!view) return;
    const me = view.seat;
    const opp = view.players.find(p => p.player !== me);
    const mine = view.players.find(p => p.player === me);
    $("opp").innerHTML = opp ? seatHtml(opp, false) + zoneHtml("Battlefield", bfOf(opp.player)) : "";
    $("me").innerHTML = (mine ? seatHtml(mine, true) : "") +
      zoneHtml("Battlefield", bfOf(me)) + zoneHtml("Hand", view.me.hand, legalCardIds());
    $("stack").innerHTML = view.stack.length
      ? view.stack.map(s => cardHtml({ name: s.chars.name, types: s.chars.cardTypes || [] }, false)).join("")
      : '<span class="empty">empty</span>';
  }

  function seatHtml(p, you) {
    const phase = view.phase, active = view.active_player ?? view.activePlayer;
    const tag = you ? '<span class="you"> (you)</span>' : "";
    const turnline = you
      ? `<div class="stat">Turn ${view.turn} · ${phase} · active P${active}</div>` : "";
    return `<div class="seat"><div class="who">Player ${p.player}${tag}</div>` +
           `<div class="life">♥ ${p.life}</div></div>` +
           `<div class="stat">hand ${p.hand_count ?? p.handCount} · library ${p.library_count ?? p.libraryCount} · grave ${p.graveyard.length}</div>` +
           turnline;
  }

  function bfOf(pid) {
    return view.battlefield.filter(o => (o.Visible ? o.Visible.controller : null) === pid);
  }

  function zoneHtml(label, objs, legalIds) {
    const items = objs.map(o => objCardHtml(o, legalIds)).join("");
    return `<h2>${label}</h2><div class="zone">${items || '<span class="empty">empty</span>'}</div>`;
  }

  function objCardHtml(o, legalIds) {
    if (o.Hidden) return cardHtml({ name: "(hidden)", types: [] }, false, false, false);
    const v = o.Visible;
    const legal = legalIds && legalIds.has(v.id);
    return cardHtml({ name: v.chars.name, types: v.chars.cardTypes || v.chars.card_types || [] },
      v.status && v.status.tapped, legal, v.id);
  }

  function cardHtml(c, tapped, legal, id) {
    const isLand = (c.types || []).includes("Land");
    const cls = ["card", isLand ? "land" : "", tapped ? "tapped" : "", legal ? "legal" : ""].filter(Boolean).join(" ");
    const ty = (c.types || []).join(" ");
    return `<div class="${cls}"><div class="nm">${esc(c.name)}</div>${ty ? `<div class="ty">${esc(ty)}</div>` : ""}</div>`;
  }

  // ids of hand cards that correspond to a legal action in the current prompt (masking)
  function legalCardIds() {
    const s = new Set();
    if (cur && cur.prompt && cur.prompt.mode === "action") {
      // labels look like "Play land — Forest"; match by name against hand cards
      const names = cur.prompt.options.map(o => o.replace(/^.*?—\s*/, "").trim());
      for (const o of view.me.hand) {
        if (o.Visible && names.includes(o.Visible.chars.name)) s.add(o.Visible.id);
      }
    }
    return s;
  }

  // ── prompt (the enumerated legal options = the masking, rendered) ───────
  function renderPrompt() {
    const p = cur.prompt;
    const root = $("prompt");
    root.innerHTML = "";
    const title = el("div", "title", p.title);
    root.appendChild(title);

    if (p.mode === "action") {
      const opts = el("div", "opts");
      p.options.forEach((label, i) => {
        const b = el("button", "opt", label);
        b.onclick = () => send({ picks: [i] });
        opts.appendChild(b);
      });
      root.appendChild(opts);
      const row = el("div", "row");
      const pass = el("button", "pass", p.canPass ? "Pass priority" : "Pass");
      pass.onclick = () => send({ pass: true });
      row.appendChild(pass);
      root.appendChild(row);
    } else if (p.mode === "selectOne") {
      const opts = el("div", "opts");
      p.options.forEach((label, i) => {
        const b = el("button", "opt", label);
        b.onclick = () => send({ picks: [i] });
        opts.appendChild(b);
      });
      root.appendChild(opts);
    } else if (p.mode === "selectMany") {
      const opts = el("div", "opts");
      p.options.forEach((label, i) => {
        const b = el("button", "opt", label);
        b.onclick = () => { toggle(multi, i); b.classList.toggle("sel"); updateSubmit(); };
        opts.appendChild(b);
      });
      root.appendChild(opts);
      root.appendChild(hint(`Choose ${p.min}–${p.max}.`));
      const row = el("div", "row");
      const submit = el("button", "act", "Submit"); submit.id = "submitMany";
      submit.onclick = () => send({ picks: [...multi].sort((a, b) => a - b) });
      row.appendChild(submit);
      root.appendChild(row);
      updateSubmit();
    } else if (p.mode === "number") {
      const inp = el("input"); inp.type = "number"; inp.min = p.numMin; inp.max = p.numMax; inp.value = p.numMin;
      root.appendChild(inp);
      root.appendChild(hint(`Enter ${p.numMin}–${p.numMax}.`));
      const row = el("div", "row");
      const submit = el("button", "act", "Submit");
      submit.onclick = () => send({ number: clamp(parseInt(inp.value || "0", 10), p.numMin, p.numMax) });
      row.appendChild(submit);
      root.appendChild(row);
    } else if (p.mode === "order") {
      // default order = as given; minimal UI just confirms current order
      const opts = el("div", "opts");
      p.options.forEach((label, i) => opts.appendChild(el("div", "opt", (i + 1) + ". " + label)));
      root.appendChild(opts);
      const row = el("div", "row");
      const submit = el("button", "act", "Keep this order");
      submit.onclick = () => send({ order: p.options.map((_, i) => i) });
      row.appendChild(submit);
      root.appendChild(row);
    }
  }

  function updateSubmit() {
    const b = $("submitMany");
    if (!b || !cur) return;
    const p = cur.prompt;
    b.disabled = multi.size < p.min || multi.size > p.max;
  }

  function renderEnd(winner) {
    const w = (winner === null || winner === undefined) ? "draw" : ("Player " + winner);
    const youWon = winner === (view ? view.seat : -1);
    $("prompt").innerHTML = `<div class="banner">Game over — winner: ${w}${youWon ? " 🎉 (you!)" : ""}</div>`;
    log("GAME OVER — winner: " + w);
  }

  // ── helpers ─────────────────────────────────────────────────────────────
  function eventText(ev) {
    const k = Object.keys(ev)[0]; const v = ev[k];
    return k + " " + JSON.stringify(v);
  }
  function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }
  function hint(t) { return el("div", "hint", t); }
  function toggle(set, i) { if (set.has(i)) set.delete(i); else set.add(i); }
  function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, isNaN(n) ? lo : n)); }
  function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
  function log(line) { const d = $("log"); d.textContent += line + "\n"; d.scrollTop = d.scrollHeight; }
})();
</script>
</body>
</html>
