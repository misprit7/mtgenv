<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mtgenv — web play</title>
<style>
  :root {
    --felt: #28452f; --felt2: #1d3324; --ink: #ecefe6; --muted: #9fb0a0;
    --rail: #1b1f1a; --panel: #232a22; --line: #3a4438; --accent: #6fd08c;
    --legal: #ffe066; --legalglow: rgba(255,224,102,.85); --sel: #5b8cff;
    /* card frame tints */
    --cW:#f4efd8; --cU:#bfe0f4; --cB:#cabfb9; --cR:#f3b9a6; --cG:#bcdcb6;
    --cMulti:#efd98a; --cColorless:#d8dadd; --cLand:#d8c3a0;
  }
  * { box-sizing: border-box; }
  /* The `hidden` attribute must win over component `display` rules (e.g. .replaybar/.hand use
     display:flex, which would otherwise override the UA [hidden]{display:none} and show them). */
  [hidden] { display: none !important; }
  html,body { height: 100%; }
  body { margin: 0; background: var(--felt2); color: var(--ink);
    font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

  .app { display: grid; grid-template-columns: 172px 1fr 264px; grid-template-rows: 40px 1fr; height: 100vh; }
  .topbar { grid-column: 1 / 4; grid-row: 1; display: flex; align-items: center; gap: 14px;
    padding: 0 14px; background: var(--rail); border-bottom: 1px solid var(--line); }
  .topbar h1 { font-size: 14px; margin: 0; font-weight: 800; letter-spacing: .4px; }
  .topbar .s { color: var(--muted); font-size: 12px; }
  .topbar a { color: var(--accent); text-decoration: none; }
  .topbar a:hover { text-decoration: underline; }
  .topbar .spacer { flex: 1; }

  .rail { grid-column: 1; grid-row: 2; background: var(--rail); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 8px; padding: 10px 8px; overflow: auto; }
  .pinfo { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 8px; }
  .pinfo.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .pinfo .who { font-weight: 700; display: flex; justify-content: space-between; align-items: baseline; }
  .pinfo .you { color: var(--accent); font-size: 11px; }
  .pinfo .life { font-size: 26px; font-weight: 800; line-height: 1; margin: 4px 0 6px; }
  .pinfo .life.low { color: #ff7a7a; }
  .pinfo .floatmana { display: flex; gap: 2px; flex-wrap: wrap; align-items: center; margin: 0 0 6px;
    padding: 3px 5px; background: var(--felt2); border: 1px solid var(--line); border-radius: 7px; }
  .pinfo .floatmana .ms { height: 16px; width: 16px; }
  .piles { display: flex; gap: 6px; }
  .pile { flex: 1; background: var(--felt2); border: 1px solid var(--line); border-radius: 7px;
    padding: 5px 4px; text-align: center; cursor: pointer; }
  .pile:hover { border-color: var(--accent); }
  .pile .n { font-weight: 700; font-size: 14px; }
  .pile .l { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .04em; }
  .phasebar { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 6px 8px;
    font-size: 11px; color: var(--muted); }
  .phasebar b { color: var(--ink); }
  .phasebar .stopline { color: var(--accent); font-size: 10px; }

  .center { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; min-width: 0;
    background: radial-gradient(120% 80% at 50% 50%, var(--felt) 0%, var(--felt2) 100%); }
  .play { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 8px 10px; gap: 4px; overflow: auto; position: relative; }
  .half { flex: 1; display: flex; flex-direction: column; gap: 6px; justify-content: center; min-height: 0; }
  .half.you { justify-content: flex-start; }
  .half.oppo { justify-content: flex-end; }
  .midline { height: 0; border-top: 1px dashed rgba(255,255,255,.18); margin: 2px 0; }
  /* Combat lane: blocked attackers + their blockers face off here during combat. */
  .combatlane { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; padding: 6px 10px;
    margin: 2px 0; background: rgba(224,132,111,.07); border: 1px solid rgba(224,132,111,.28);
    border-radius: 10px; }
  .combatlane[hidden] { display: none; }
  .matchup { display: flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 5px 7px; border-radius: 9px; background: rgba(0,0,0,.18); box-shadow: inset 0 0 0 1px rgba(224,132,111,.22); }
  .matchrow { display: flex; gap: 5px; align-items: flex-start; justify-content: center; }
  .matchup .vs { color: #e0846f; font-size: 12px; line-height: 1; font-weight: 700; letter-spacing: .04em; }
  .matchup.unblocked { box-shadow: inset 0 0 0 1px rgba(224,132,111,.5); }
  .matchup .vs.through { color: #e8b06a; }
  .row { display: flex; gap: 7px; flex-wrap: wrap; align-items: flex-start; min-height: 96px; align-content: flex-start; }
  .row.lands { min-height: 80px; }
  /* Creature band: two side-by-side groups (don't wrap the groups; each wraps internally). */
  .row.creatures { flex-wrap: nowrap; gap: 0; }
  .permgroup { display: flex; gap: 7px; flex-wrap: wrap; align-items: flex-start; align-content: flex-start; }
  .permgroup.cg { flex: 1 1 auto; min-width: 0; }            /* creatures — grow, wrap internally */
  .permgroup.og { flex: 0 0 auto; align-self: stretch; max-width: 45%;  /* noncreature artifacts/enchantments — off to the right */
    margin-left: 10px; padding-left: 12px; border-left: 1px dashed var(--line); }
  .rowlabel { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .08em;
    align-self: center; width: 46px; flex: 0 0 46px; text-align: right; padding-right: 4px; opacity: .65; }

  .stack { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 5;
    display: flex; gap: 8px; pointer-events: none; }
  /* Container stays click-through (so the gaps don't block the board beneath it), but the cards
     themselves capture the pointer — otherwise hover-preview + click-to-target a stack spell fail. */
  .stack .card { box-shadow: 0 8px 24px rgba(0,0,0,.5); pointer-events: auto; }

  /* MTGO-style phase/step bar, just above the hand */
  .stepbar { display: flex; gap: 3px; padding: 5px 12px; background: var(--rail);
    border-top: 1px solid var(--line); align-items: stretch; }
  .step { flex: 1 1 0; min-width: 40px; text-align: center; padding: 3px 2px; border-radius: 6px;
    background: var(--panel); border: 1px solid var(--line); position: relative; user-select: none; }
  .step.cur { background: var(--accent); color: #06140b; border-color: var(--accent); font-weight: 800; }
  .step.clickable { cursor: pointer; }
  .step.clickable:hover { border-color: var(--accent); }
  .step .slabel { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* two stop dots per step: top = your turn, bottom = opponent's turn (independently toggleable) */
  .step .sdots { display: flex; flex-direction: column; align-items: stretch; gap: 2px; margin-top: 3px; }
  /* each dot sits in a full-width clickable row → a big, easy hit target (not just the 12px dot) */
  .step .sdotrow { display: flex; justify-content: center; align-items: center; height: 18px;
    border-radius: 4px; cursor: pointer; }
  .step .sdotrow:hover { background: rgba(255,255,255,.12); }
  .step .sdot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--muted); }
  .step .sdotrow:hover .sdot { border-color: var(--accent); }
  .step .sdot.opp { border-style: dashed; } /* opponent's-turn dot reads as a dashed ring when off */
  .step .sdot.on { background: #d23b3b; border-color: #ff7a7a; box-shadow: 0 0 6px #d23b3b; }
  .step.cur .sdot { border-color: #06140b; }
  .step .dotlbl { font-size: 9px; line-height: 18px; height: 18px; color: var(--muted); }
  .step.legend { flex: 0 0 auto; min-width: 28px; background: transparent; border-color: transparent; }
  /* auto-pass-this-turn indicator (Enter) */
  .autopass-badge { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: #b9821f; color: #1a1205; font-weight: 700; font-size: 12px; padding: 6px 14px;
    border-radius: 999px; box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 90; display: none; }
  .autopass-badge::before { content: "⏩ "; }
  .hand { background: var(--rail); border-top: 1px solid var(--line); padding: 8px 12px 10px;
    display: flex; gap: 8px; align-items: flex-end; overflow-x: auto; min-height: 150px; }
  .hand .hlabel { color: var(--muted); font-size: 10px; align-self: center; writing-mode: vertical-rl;
    transform: rotate(180deg); text-transform: uppercase; letter-spacing: .1em; }

  .logpanel { grid-column: 3; grid-row: 2; background: var(--rail); border-left: 1px solid var(--line);
    display: flex; flex-direction: column; min-height: 0; }
  .promptbox { padding: 10px; border-bottom: 1px solid var(--line); }
  .promptbox .title { font-weight: 700; margin-bottom: 8px; }
  .promptbox .opts { display: flex; flex-direction: column; gap: 6px; }
  .promptbox .hint { color: var(--muted); font-size: 11px; margin: 6px 0; }
  .promptbox .slotgroup { margin: 4px 0 8px; padding-left: 8px; border-left: 2px solid var(--line); }
  .promptbox .slothdr { font-weight: 700; font-size: 12px; color: var(--accent); margin: 4px 0; }
  .opt.optcard { display: flex; align-items: center; gap: 8px; text-align: left; }
  .opt.optcard .optart { width: 38px; height: 27px; border-radius: 3px; flex: 0 0 auto;
    background: #0c120f center/cover no-repeat; border: 1px solid rgba(0,0,0,.4); }
  .opt.optcard .optname { font-weight: 700; }
  button.opt { text-align: left; background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 9px; cursor: pointer; font: inherit; }
  button.opt:hover { border-color: var(--accent); }
  .actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  button.act { background: var(--accent); color: #06140b; border: none; border-radius: 8px;
    padding: 7px 13px; font-weight: 700; cursor: pointer; font: inherit; }
  button.pass { background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 13px; cursor: pointer; font: inherit; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  input[type=number] { width: 80px; background: var(--panel); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px; padding: 6px; font: inherit; }
  .waiting { color: var(--muted); font-style: italic; }
  .banner { padding: 10px; border-radius: 8px; background: rgba(111,208,140,.14); border: 1px solid var(--accent);
    color: var(--accent); font-weight: 800; }
  .logtitle { padding: 8px 10px 4px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
  #log { flex: 1; overflow: auto; padding: 0 10px 10px; font-family: ui-monospace, Menlo, monospace;
    font-size: 10px; color: var(--muted); white-space: pre-wrap; }

  /* ── MTG card frame ───────────────────────────────────────────── */
  .card { width: 86px; height: 120px; border-radius: 7px; padding: 4px; position: relative;
    background: var(--cColorless); color: #15110c; border: 2px solid rgba(0,0,0,.45);
    box-shadow: 0 2px 5px rgba(0,0,0,.4); display: flex; flex-direction: column; gap: 2px;
    flex: 0 0 auto; user-select: none; }
  /* Card colour is shown by a coloured 2px frame + a tinted title bar. */
  .card.w { background: var(--cW); border-color: #cdbd6a; }
  .card.u { background: var(--cU); border-color: #3b7cb3; }
  .card.b { background: var(--cB); border-color: #6b6660; }
  .card.r { background: var(--cR); border-color: #c4503c; }
  .card.g { background: var(--cG); border-color: #3f8f46; }
  .card.multi { background: var(--cMulti); border-color: #c9a227; }
  .card.land { background: var(--cLand); border-color: #9a7b45; }
  .card.colorless { background: var(--cColorless); border-color: #9aa0a6; }
  .card .c-hdr { display: flex; justify-content: space-between; align-items: center; gap: 3px;
    background: rgba(255,255,255,.5); border-radius: 4px; padding: 1px 3px; }
  .card.w .c-hdr { background: #ece3a8; } .card.u .c-hdr { background: #b7d8f0; }
  .card.b .c-hdr { background: #c4bbb3; } .card.r .c-hdr { background: #f0b3a0; }
  .card.g .c-hdr { background: #b2d6ac; } .card.multi .c-hdr { background: #ecd98a; }
  .card.land .c-hdr { background: #d8c39a; } .card.colorless .c-hdr { background: #cdd0d4; }
  /* Real MTG mana/tap symbols (Scryfall SVGs), in the cost row and inline in rules text. */
  .ms { height: 13px; width: 13px; display: inline-block; vertical-align: middle; }
  .c-rules .ms, .c-type .ms { height: 10px; width: 10px; vertical-align: -1px; }
  .c-art { position: relative; background-position: center; }
  .c-art .credit { position: absolute; bottom: 0; left: 0; right: 0; font-size: 5.5px; color: #fff;
    background: rgba(0,0,0,.5); padding: 0 2px; text-align: right; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .hand .c-art .credit { font-size: 7px; padding: 0 3px; }
  .card .c-name { font-size: 9px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .c-mana { display: flex; gap: 1px; flex: 0 0 auto; }
  .pip { width: 12px; height: 12px; border-radius: 50%; font-size: 8px; font-weight: 800; line-height: 12px;
    text-align: center; border: 1px solid rgba(0,0,0,.4); color: #15110c; }
  .pip.gen { background: #cdc5b4; } .pip.w { background: #fbf8e8; } .pip.u { background: #9fd5f5; }
  .pip.b { background: #b6aaa2; } .pip.r { background: #f3a98e; } .pip.g { background: #8fce9c; }
  .card .c-art { flex: 1; border-radius: 3px; min-height: 28px;
    background: linear-gradient(135deg,#5a5246,#39342b); border: 1px solid rgba(0,0,0,.3); }
  .card .c-type { font-size: 7.5px; background: rgba(255,255,255,.4); border-radius: 3px; padding: 1px 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .c-rules { font-size: 7.5px; background: rgba(255,255,255,.55); border-radius: 3px; padding: 2px 3px;
    flex: 0 1 auto; min-height: 14px; color: #2a241b; overflow: hidden; line-height: 1.25;
    /* Show several lines of oracle text, but hard-clip long text (e.g. Mossborn Hydra) with an
       ellipsis instead of letting it blow out of the card frame. */
    display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 4; line-clamp: 4; }
  .card .c-pt { position: absolute; right: 3px; bottom: 2px; background: rgba(255,255,255,.85);
    border: 1px solid rgba(0,0,0,.4); border-radius: 4px; font-size: 9px; font-weight: 800; padding: 0 3px; }
  .card.tapped { transform: rotate(90deg); margin: 18px 24px; }
  .card.legal { cursor: pointer; box-shadow: 0 0 0 2px var(--legal), 0 0 12px var(--legalglow); }
  .card.legal:hover { box-shadow: 0 0 0 3px var(--legal), 0 0 16px var(--legalglow); }
  .card.selected { box-shadow: 0 0 0 3px var(--sel), 0 0 14px rgba(91,140,255,.7); position: relative; }
  .card.selected::after { content: "🎯"; position: absolute; top: 2px; right: 3px; font-size: 13px;
    text-shadow: 0 0 3px #000; }
  /* Cast-variant chooser: a small popup when a card has >1 legal cast (e.g. Normal + Warp). */
  .varmenu { position: fixed; z-index: 80; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 5px; box-shadow: 0 6px 22px rgba(0,0,0,.55); display: flex;
    flex-direction: column; gap: 4px; min-width: 170px; }
  .varhdr { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
    padding: 2px 6px 3px; }
  .varitem { text-align: left; background: var(--rail); color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 7px 10px; font-size: 12px; cursor: pointer; }
  .varitem:hover { border-color: var(--accent); background: var(--panel); }
  /* chosen target/option feedback: selected side-panel buttons, player panels, and a summary line */
  button.opt.sel { background: var(--sel); color: #06140b; border-color: var(--sel); font-weight: 700; }
  button.opt.sel::before { content: "✓ "; }
  .pinfo.targetable { cursor: pointer; box-shadow: 0 0 0 2px var(--legal), 0 0 12px var(--legalglow); }
  .pinfo.targeted { cursor: pointer; box-shadow: 0 0 0 3px var(--sel), 0 0 16px rgba(91,140,255,.8); }
  .pinfo .tgtbadge { color: var(--sel); font-weight: 800; font-size: 11px; }
  .chosen { margin-top: 6px; color: var(--sel); font-weight: 700; font-size: 12px; }
  .card.back { background: repeating-linear-gradient(45deg,#3a2d52,#3a2d52 6px,#473864 6px,#473864 12px);
    border: 1px solid #241c33; }
  /* dev "not fully implemented" alert — yellow corner badge; tooltip carries the deferred clause */
  .card .warnbadge { position: absolute; top: 2px; left: 2px; min-width: 15px; height: 15px; padding: 0 2px;
    border-radius: 4px; background: #f5c518; color: #1a1205; font-size: 11px; line-height: 15px; text-align: center;
    font-weight: 900; box-shadow: 0 0 4px rgba(0,0,0,.55); cursor: help; z-index: 3; }
  .card .badge { position: absolute; left: 3px; bottom: 2px; font-size: 8px; font-weight: 800;
    padding: 0 3px; border-radius: 4px; }
  .badge.atk { background: #d23b3b; color: #fff; } .badge.blk { background: #3b78d2; color: #fff; }
  .badge.dmg { background: #111; color: #ff7a7a; right: 3px; left: auto; bottom: 18px; }
  .ctrs { position: absolute; top: 18px; left: 3px; display: flex; flex-direction: column; gap: 1px; }
  .ctr { background: #2a8a52; color: #fff; font-size: 7px; font-weight: 800; padding: 0 2px; border-radius: 3px; border: 1px solid rgba(0,0,0,.4); }
  .card.sick .c-art::after { content: "˝"; }
  .card.sick { opacity: .82; }
  .hand .card { width: 104px; height: 146px; }
  .hand .card .c-name { font-size: 10px; } .hand .card .c-type, .hand .card .c-rules { font-size: 8.5px; }
  /* Hand cards are larger, so they can show more oracle-text lines before clipping. */
  .hand .card .c-rules { -webkit-line-clamp: 6; line-clamp: 6; }
  .card.mini { width: 64px; height: 90px; }

  /* zone viewer modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center;
    justify-content: center; z-index: 50; }
  .modal.show { display: flex; }
  .modal .box { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px;
    max-width: 80vw; max-height: 80vh; overflow: auto; }
  .modal .box h3 { margin: 0 0 10px; }
  .modal .grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .modal .close { float: right; cursor: pointer; color: var(--muted); }
  .pile.clk { box-shadow: inset 0 0 0 1px var(--accent); }
  /* decklist peek (grouped, MTGO-style deck view) */
  .decklist { display: flex; flex-direction: column; gap: 3px; min-width: 360px; }
  .dlrow { display: flex; align-items: center; gap: 8px; padding: 3px 8px 3px 4px; border-radius: 6px;
    background: var(--felt2); border-left: 3px solid var(--line); cursor: default; }
  .dlrow:hover { background: var(--panel); }
  .dlrow.w { border-left-color: #e9e3c8; } .dlrow.u { border-left-color: #6fb7e6; }
  .dlrow.b { border-left-color: #9b8aa6; } .dlrow.r { border-left-color: #e08a6f; }
  .dlrow.g { border-left-color: #74b06a; } .dlrow.multi { border-left-color: #d9b85a; }
  .dlrow.land { border-left-color: #b08a5a; } .dlrow.colorless { border-left-color: #9aa0a6; }
  .dlcount { font-weight: 700; font-size: 13px; width: 26px; text-align: right; color: var(--muted); }
  .dlthumb { width: 34px; height: 24px; border-radius: 3px; background-size: cover; background-position: center 18%;
    background-color: var(--felt); flex: none; }
  .dlname { flex: 1; font-size: 13px; }
  .dlpips { display: flex; gap: 1px; align-items: center; }
  .dlpips .ms { width: 14px; height: 14px; }
  /* hover full-card preview */
  #preview { position: fixed; display: none; width: 320px; border-radius: 12px; z-index: 100;
    box-shadow: 0 12px 44px rgba(0,0,0,.75); pointer-events: none; }
  /* Target arrows: a full-viewport SVG overlay drawn from stack cards to their targets. */
  #arrows { position: fixed; inset: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 60; }
  /* Auras / equipment stacked behind their host. The wrapper is the row's flow element; the
     attached cards are absolutely positioned behind, the host sits on top. */
  .attachwrap { position: relative; flex: 0 0 auto; }
  .attachwrap .card.attach { position: absolute; top: 0; left: 0; box-shadow: 0 3px 8px rgba(0,0,0,.6);
    filter: brightness(.9); }
  /* A triggered/activated ability on the stack (vs. a spell card) — dashed frame. */
  .card.ability { border-style: dashed; border-width: 2px; }
  /* God-view opponent hand strip (replay / spectate). */
  .godhand { border-bottom: 1px solid var(--line); }
  .godhand .hlabel { color: var(--accent2); }
  /* Replay playback bar. */
  .replaybar { display: flex; align-items: center; gap: 10px; padding: 6px 10px; margin: 4px 0;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px; flex-wrap: wrap; }
  .replaybar .rbtn { background: var(--accent2); color: #04121d; border: none; border-radius: 6px;
    padding: 4px 10px; font-weight: 800; cursor: pointer; font-size: 13px; }
  .replaybar .rbtn:hover { filter: brightness(1.08); }
  .replaybar .rbtn:disabled { opacity: .4; cursor: not-allowed; }
  .replaybar .rbscrub { flex: 1 1 220px; min-width: 140px; accent-color: var(--accent2); cursor: pointer; }
  .replaybar .rbframe { font-variant-numeric: tabular-nums; color: var(--muted); min-width: 64px; }
  .replaybar .rbrate { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .replaybar .rbrate input { accent-color: var(--accent2); }
  .replaybar .rblabel { color: var(--ink); font-size: 12px; flex: 1 1 140px; min-width: 120px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── new touch affordances (all viewport sizes) ─────────────────────────────── */
  /* "Pass turn" button — on-screen equivalent of Enter (hold through this turn's stops). */
  button.passturn.held { background: #b9821f; color: #1a1205; border-color: #d69a2a; font-weight: 700; }
  button.passturn.held::before { content: "⏩ "; }
  /* Mobile-only "Log" toggle in the top bar (hidden on desktop). */
  .logtoggle { display: none; background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 4px 10px; font: inherit; cursor: pointer; }
  .logtoggle.on { background: var(--accent); color: #06140b; border-color: var(--accent); }
  /* Long-press full-card preview (touch): centered overlay. Desktop still uses hover #preview;
     this only opens on a touch long-press, so it's harmless at desktop sizes. */
  .preview-overlay { position: fixed; inset: 0; z-index: 120; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,.74); padding: 20px; }
  .preview-overlay.show { display: flex; }
  .preview-overlay img { max-width: 90vw; max-height: 84vh; border-radius: 14px;
    box-shadow: 0 14px 50px rgba(0,0,0,.8); }
  .preview-overlay .preview-close { position: fixed; top: 10px; right: 16px; color: #fff;
    font-size: 30px; line-height: 1; font-weight: 700; cursor: pointer; text-shadow: 0 1px 4px #000; }
  /* Bottom-sheet slot for your player strip (mobile only). Empty & inert on desktop; on mobile the
     client mounts your life/piles panel here so it rides the sticky prompt sheet. */
  #selfSlot:empty { display: none; }

  /* ── mobile reflow (iPhone portrait ~390×844; landscape secondary) ──────────────
     Scoped to narrow OR short viewports so a phone reflows in both orientations (landscape iPhone is
     ~≤430px tall); real desktops (≥1000px wide AND tall) are untouched. */
  @media (max-width: 760px), (max-height: 500px) {
    html, body { height: auto; }
    body { overflow: auto; }
    /* single column, whole page scrolls — kills the play-area-squeezed-between-two-sidebars complaint */
    .app { display: flex; flex-direction: column; height: auto; min-height: 100dvh; overflow-x: clip; }

    /* compact, wrapping top bar + a Log toggle */
    .topbar { order: 0; flex-wrap: wrap; height: auto; gap: 4px 10px; padding: 6px 10px; }
    .topbar a { padding: 4px 5px; }
    .logtoggle { display: inline-block; }

    /* flatten the rail so its opponent panel / phasebar / your panel become direct flex items we can
       interleave: opponent strip up top, your strip down by the prompt (Arena-style vertical order). */
    .rail { display: contents; }
    .phasebar { display: none; }
    .pinfo.opp  { order: 1; }
    .center     { order: 2; }
    .logpanel   { order: 4; }

    /* player panels → compact horizontal strips */
    .pinfo { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 12px; margin: 6px 8px; padding: 6px 8px; }
    .pinfo .who { flex: 0 0 auto; }
    .pinfo .life { font-size: 20px; margin: 0; }
    .pinfo .floatmana { margin: 0; }
    .pinfo .piles { flex: 1 1 auto; justify-content: flex-end; }

    /* board grows with its content; the page scrolls (no inner scroll pane) */
    .center { min-width: 0; }
    .play { overflow: visible; padding: 6px 6px; }
    .half { flex: none; }
    /* compact the (often-empty) rows so the board doesn't push your hand far below the fold */
    .row { min-height: 64px; }
    .row.lands { min-height: 50px; }
    .hand { min-height: 0; }
    .hand .card { width: 88px; height: 124px; }

    /* phase/step bar must never force the page wide — scroll it internally instead */
    .stepbar { overflow-x: auto; }

    /* bottom sheet: your strip + the prompt are ALWAYS reachable (sticky bottom); log hides behind a
       toggle. Sheet order top→bottom: [log title, log] (when open) · your strip · prompt (thumb). */
    .logpanel { position: sticky; bottom: 0; z-index: 30; background: var(--rail);
      border-left: none; border-top: 1px solid var(--line);
      display: flex; flex-direction: column; }
    .logtitle { order: 0; display: none; }
    #log { order: 1; display: none; max-height: 40vh; }
    #selfSlot { order: 2; }
    .promptbox { order: 3; border-bottom: none; max-height: 46vh; overflow: auto;
      box-shadow: 0 -6px 20px rgba(0,0,0,.5); }
    body.show-log .logtitle { display: block; }
    body.show-log #log { display: block; }

    /* bigger touch targets */
    .step .sdotrow { height: 36px; }
    .step .sdot { width: 16px; height: 16px; }
    .decklist { min-width: 0; }
    button.opt, button.act, button.pass { padding: 9px 12px; }
    .pile { padding: 6px 5px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>mtgenv</h1>
    <span class="s" id="turn">—</span>
    <span class="s" id="conn">connecting…</span>
    <span class="spacer"></span>
    <span class="s" id="decks"></span>
    <span class="s" id="stops"></span>
    <span class="s">new:
      <a href="?">demo</a> ·
      <a href="?p0=burn&amp;p1=bears">burn</a> ·
      <a href="?p0=bears&amp;p1=burn">bears</a></span>
    <button class="logtoggle" id="logToggle" title="Show / hide the game log">▤ Log</button>
  </div>

  <div class="rail" id="rail"></div>

  <div class="center">
    <!-- God-view (replay / spectate) only: opponent hand face-up at top. Hidden in normal play. -->
    <div class="hand godhand" id="oppHand" hidden></div>
    <div class="play">
      <div class="half oppo" id="oppoHalf"></div>
      <div class="midline"></div>
      <!-- Combat lane: during combat, blocked attackers + their blockers move here (facing off) so
           it's clear what's blocking what; empty/hidden otherwise. -->
      <div class="combatlane" id="combatLane" hidden></div>
      <div class="half you" id="youHalf"></div>
      <div class="stack" id="stack"></div>
    </div>
    <div class="stepbar" id="stepbar"></div>
    <!-- Replay playback bar (god-view frame player). Hidden unless ?replay=<id>. -->
    <div class="replaybar" id="replaybar" hidden>
      <button class="rbtn" id="rbBack" title="Step back (←)">⏮</button>
      <button class="rbtn" id="rbPlay" title="Play / pause (space)">▶</button>
      <button class="rbtn" id="rbFwd" title="Step forward (→)">⏭</button>
      <input type="range" class="rbscrub" id="rbScrub" min="0" max="0" step="1" value="0" title="Scrub through the game" />
      <span class="rbframe" id="rbFrame">0 / 0</span>
      <label class="rbrate">rate <input type="range" id="rbRate" min="1" max="30" step="1" value="3" /> <span id="rbRateV">3</span>/s</label>
      <span class="rblabel" id="rbLabel"></span>
    </div>
    <div class="hand" id="hand"></div>
  </div>

  <div class="logpanel">
    <div id="selfSlot"></div>
    <div class="promptbox" id="prompt"><div class="waiting">Waiting for the game to start…</div></div>
    <div class="logtitle">Game log</div>
    <div id="log"></div>
  </div>
</div>

<div class="modal" id="modal"><div class="box"><span class="close" id="modalClose">✕ close</span><h3 id="modalTitle"></h3><div class="grid" id="modalGrid"></div></div></div>
<svg id="arrows" aria-hidden="true"></svg>
<img id="preview" alt="" />

<script>
"use strict";
(function () {
  const $ = (id) => document.getElementById(id);
  let view = null, cur = null, lastTurn = 0;
  const multi = new Set();
  let orderSeq = [];
  let stopsView = null; // live stop config echoed by the server (phase bar + toggles read this)
  const deckView = {}; // seat → starting decklist (debug peek; RL-safe, pushed once at setup)

  // Card art: a baked manifest (grp_id → art_crop/artist), batch-resolved from Scryfall once.
  // No runtime Scryfall API calls — we only load the cached CDN images.
  let artMap = {};
  fetch("/card-art.json").then(r => r.json()).then(m => { artMap = m; render(); }).catch(() => {});

  const params = new URLSearchParams(location.search);
  const gameId = params.get("game");
  const replayId = params.get("replay");
  const spectating = params.get("spectate") === "1" || params.get("spectate") === "true";
  // God-view (no information masking): replays and spectating (the server feeds spectators
  // omniscient god frames, so both hands + ordered libraries render — spectators aren't players).
  let godMode = !!replayId || spectating;
  $("decks").textContent = replayId
    ? "▶ Replay #" + replayId
    : spectating
      ? "👁 Spectating Game #" + gameId
      : gameId
        ? "Game #" + gameId + " · you are Player " + (params.get("seat") || "0")
        : "P0=" + (params.get("p0") || "demo") + " · P1=" + (params.get("p1") || "demo");
  if (spectating) $("prompt").innerHTML = '<div class="waiting">👁 Spectating — watching the game (you are not playing).</div>';
  if (replayId) $("prompt").innerHTML = '<div class="waiting">▶ Replay — god-view playback (no hidden information). Use the bar below.</div>';
  // Stops control (top bar): LIVE toggles — send setOption; the server echoes the new config and
  // the running game's agent honours it at the next window (no reset). Rendered from stopsView.
  // The only user-facing stop toggle is Full Control (stop at every priority window). The former
  // auto-pass / smart / resolve-own knobs were collapsed into it engine-side; OFF = the engine's
  // fixed `should_auto_pass` elision rule.
  const OPT = [["full ctrl", "full_control", "fullcontrol"]];
  function renderStopsControl() {
    const host = $("stops"); host.innerHTML = "";
    if (!stopsView) return;
    host.appendChild(document.createTextNode("stops: "));
    OPT.forEach(([label, field, key], i) => {
      if (i) host.appendChild(document.createTextNode(" · "));
      const a = el("a", null, label + ": " + (stopsView[field] ? "on" : "off"));
      a.href = "#";
      a.onclick = (e) => { e.preventDefault(); setOption(key, !stopsView[field]); };
      host.appendChild(a);
    });
  }
  function setOption(key, on) { if (ws) ws.send(JSON.stringify({ type: "setOption", key: key, on: on })); }

  // Replay mode has no live socket — it plays back recorded god-view frames. Normal/spectate modes
  // open the WebSocket as before.
  let ws = null;
  if (replayId) {
    $("conn").textContent = "● replay";
    startReplay();
  } else {
    ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws" + location.search);
    ws.onopen = () => { $("conn").textContent = "● connected";
      log("Keys: Space = pass priority / take the only action · Enter = pass through this turn's stops (Esc cancels)"); };
    ws.onclose = () => ($("conn").textContent = "○ disconnected");
    ws.onerror = () => ($("conn").textContent = "connection error");
    ws.onmessage = (e) => handle(JSON.parse(e.data));
  }

  function handle(m) {
    if (m.type === "event") { view = m.view; logEvent(m.event); render(); }
    else if (m.type === "godFrame") {
      // Live god-view spectating: omniscient frame (no masking). Render via the same adapter as
      // replays; surface the label of what just happened in the spectating banner.
      view = godToView(m.state, 0);
      if (m.label) { $("prompt").innerHTML = '<div class="waiting">👁 ' + esc(m.label) + "</div>"; }
      render();
    }
    else if (m.type === "decide") {
      view = m.view; cur = m; multi.clear(); orderSeq = [];
      // Enter-engaged "pass through this turn's stops" lapses when the turn advances (MTGA parity).
      if (autoPassTurn !== null && view.turn !== autoPassTurn) { autoPassTurn = null; autoPassBadge(); }
      // Priority windows: apply the stop policy (Enter-hold passes the rest of the turn; otherwise
      // the fixed rule). Forced choices (targets/blocks/order/number) aren't priority prompts → shown.
      // The engine surfaces only real stops now; just honour the optional "pass this turn's stops" hold.
      if (isPriorityPrompt(cur.prompt) && autoPassEngaged()) { send({ pass: true }); return; }
      render();
    }
    else if (m.type === "gameOver") { cur = null; renderEnd(m.winner); }
    else if (m.type === "log") { log(m.text); }
    else if (m.type === "stops") { stopsView = m; renderStopsControl(); if (view) renderStepBar(); }
    else if (m.type === "decklist") { deckView[m.seat] = m.cards; if (view) render(); }
  }

  function logEvent(ev) {
    if (view && view.turn !== lastTurn) { lastTurn = view.turn; log("—— Turn " + lastTurn + " ——"); }
    const t = eventText(ev);
    if (t) log(t);
  }

  function send(payload) {
    if (!cur) return;
    closeVariantMenu();
    ws.send(JSON.stringify(Object.assign({ type: "response", id: cur.id, picks: [], number: null, pass: false, order: [] }, payload)));
    cur = null; multi.clear();
    $("prompt").innerHTML = '<div class="waiting">Waiting for the opponent…</div>';
    render();
  }

  // ── replay playback (god-view frame player) ───────────────────────────────
  let replay = null, frameIdx = 0, playing = false, playTimer = null, frameRate = 3;
  // Adapt an omniscient GodView frame into the shape render() expects (PlayerView-ish), with NO
  // masking: every zone is the real face-up list. Viewpoint seat 0 sits on the bottom half.
  function godToView(g, seat) {
    const players = (g.players || []).map(p => ({
      player: p.player, life: p.life, poison: p.poison,
      mana_pool: p.mana_pool, counters: p.counters,
      hand_count: (p.hand || []).length, library_count: (p.library || []).length,
      graveyard: p.graveyard || [], exile_public: p.exile || [],
      _hand: p.hand || [], _library: p.library || [], // god-view full zones (library is ordered)
    }));
    const self = players.find(p => p.player === seat) || players[0] || { _hand: [] };
    return {
      seat: seat, turn: g.turn, active_player: g.active_player, phase: g.phase,
      priority_player: g.priority_player, players: players,
      me: { hand: self._hand, known_library: [], revealed_to_me: [] },
      battlefield: g.battlefield || [], stack: g.stack || [], combat: g.combat || null,
      stops: null, _god: true,
    };
  }
  function replaySource(s) {
    if (s === "Human" || (s && s.Human !== undefined)) return "human game";
    if (s && s.AiTraining) return "AI training — step " + s.AiTraining.step;
    return "" + s;
  }
  function frameCount() { return replay && replay.frames ? replay.frames.length : 0; }
  function startReplay() {
    $("replaybar").hidden = false;
    fetch("/api/replays/" + encodeURIComponent(replayId))
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(rep => {
        replay = rep;
        const meta = rep.meta || {};
        if (meta.players) $("decks").textContent = "▶ Replay #" + replayId + " · " +
          meta.players.map(p => "P" + p.seat + " " + (p.deck || "?")).join(" vs ");
        log("Loaded replay: " + frameCount() + " frames" + (meta.source ? " · " + replaySource(meta.source) : ""));
        showFrame(0);
      })
      .catch(e => { $("prompt").innerHTML = '<div class="banner">Replay #' + esc(replayId) +
        " unavailable (" + esc(e.message) + "). The replay backend may not be wired yet.</div>"; });
  }
  function showFrame(i) {
    const n = frameCount(); if (!n) return;
    frameIdx = Math.max(0, Math.min(i, n - 1));
    const fr = replay.frames[frameIdx];
    view = godToView(fr.state, 0);
    render();
    $("rbFrame").textContent = (frameIdx + 1) + " / " + n;
    $("rbLabel").textContent = fr.label || "";
    $("rbBack").disabled = frameIdx === 0;
    $("rbFwd").disabled = frameIdx === n - 1;
    const sc = $("rbScrub"); sc.max = n - 1; sc.value = frameIdx; // keep the scrubber in sync
    if (playing && frameIdx >= n - 1) pauseReplay();
  }
  function stepReplay(d) { pauseReplay(); showFrame(frameIdx + d); }
  function playReplay() {
    if (!frameCount()) return;
    if (frameIdx >= frameCount() - 1) frameIdx = -1; // at end → restart from the top
    playing = true; $("rbPlay").textContent = "❚❚";
    playTimer = setInterval(() => showFrame(frameIdx + 1), Math.round(1000 / frameRate));
  }
  function pauseReplay() { playing = false; $("rbPlay").textContent = "▶"; if (playTimer) { clearInterval(playTimer); playTimer = null; } }
  function togglePlay() { playing ? pauseReplay() : playReplay(); }
  if (replayId) {
    $("rbBack").onclick = () => stepReplay(-1);
    $("rbFwd").onclick = () => stepReplay(1);
    $("rbPlay").onclick = togglePlay;
    $("rbScrub").oninput = (e) => { pauseReplay(); showFrame(+e.target.value); };
    $("rbRate").oninput = (e) => { frameRate = +e.target.value || 1; $("rbRateV").textContent = frameRate;
      if (playing) { pauseReplay(); playReplay(); } };
  }

  // ── object/view helpers ───────────────────────────────────────────────
  function norm(o) {
    if (o.Hidden) return { hidden: true, id: o.Hidden.id, controller: o.Hidden.controller };
    const v = o.Visible;
    return { id: v.id, chars: v.chars, tapped: !!(v.status && v.status.tapped),
      sick: v.summoning_sick, dmg: v.damage_marked || 0, counters: v.counters,
      controller: v.controller, owner: v.owner, attachments: v.attachments || [] };
  }
  const me = () => view.seat;
  const oppId = () => { const p = view.players.find(p => p.player !== me()); return p ? p.player : null; };
  function bfOf(pid) { return view.battlefield.map(norm).filter(c => c.controller === pid); }
  function isLand(chars) { return (chars.card_types || chars.cardTypes || []).includes("Land"); }
  function isCreature(chars) { return (chars.card_types || chars.cardTypes || []).includes("Creature"); }
  function pub(pid) { return view.players.find(p => p.player === pid) || {}; }

  // option_objs lookup → option index for a clicked card (or -1)
  // ALL option indices whose object is `id`. A single card can map to several legal options — e.g.
  // a spell castable both for its normal cost and an alt-cost (Warp), or any future multi-mode cast.
  // The card click disambiguates between them (see onCardClick / showVariantMenu).
  function legalIdxs(id) {
    if (!cur) return [];
    const objs = cur.prompt.option_objs || cur.prompt.optionObjs || [];
    const out = []; for (let i = 0; i < objs.length; i++) if (objs[i] === id) out.push(i);
    return out;
  }

  // ── render ─────────────────────────────────────────────────────────────
  function render() {
    if (!view) return;
    $("turn").textContent = "Turn " + view.turn + " · " + view.phase + " · active P" + view.active_player +
      (view.priority_player != null ? " · priority P" + view.priority_player : "");
    renderRail();
    computeCombat();   // figure out which creatures are engaged BEFORE drawing the halves
    renderHalf("oppoHalf", oppId(), true);
    renderHalf("youHalf", me(), false);
    renderCombatLane();
    renderStack();
    renderStepBar();
    renderHand();
    if (cur) renderPrompt();
    refreshPreview(); // re-derive the hover preview against the freshly-rebuilt DOM
    drawArrows();     // draw stack→target arrows over the rebuilt board
  }

  // MTGO-style phase/step bar. `stop` = a priority-granting step you can stop at (StopType vocab).
  const STEPS = [
    { phase: "Untap", label: "Untap", stop: false },
    { phase: "Upkeep", label: "Upkeep", stop: true },
    { phase: "Draw", label: "Draw", stop: true },
    { phase: "PrecombatMain", label: "Main 1", stop: true },
    { phase: "BeginCombat", label: "Combat", stop: true },
    { phase: "DeclareAttackers", label: "Attack", stop: true },
    { phase: "DeclareBlockers", label: "Block", stop: true },
    { phase: "CombatDamage", label: "Damage", stop: true },
    { phase: "EndCombat", label: "End Cbt", stop: true },
    { phase: "PostcombatMain", label: "Main 2", stop: true },
    { phase: "End", label: "End", stop: true },
    { phase: "Cleanup", label: "Cleanup", stop: false },
  ];
  function stopMap() {
    // per_step rows are [phase, on_my_turn, on_opp_turn]; fall back to one-sided shapes gracefully.
    const m = {};
    const src = (stopsView && stopsView.per_step) || (view.stops && view.stops.per_step) || [];
    src.forEach(p => (m[p[0]] = { mine: !!p[1], opp: p.length > 2 ? !!p[2] : !!p[1] }));
    return m;
  }
  function renderStepBar() {
    const bar = $("stepbar");
    bar.innerHTML = "";
    const stops = stopMap();
    // left legend: which dot is which (top = your turn, bottom = opponent's turn)
    const legend = el("div", "step legend");
    legend.appendChild(el("div", "slabel", "stop"));
    const lz = el("div", "sdots");
    lz.appendChild(el("div", "dotlbl", "opp"));
    lz.appendChild(el("div", "dotlbl", "you"));
    legend.appendChild(lz);
    bar.appendChild(legend);
    STEPS.forEach(st => {
      const cell = el("div", "step" + (view.phase === st.phase ? " cur" : ""));
      cell.appendChild(el("div", "slabel", st.label));
      if (st.stop) {
        const s = stops[st.phase] || { mine: false, opp: false };
        const dots = el("div", "sdots");
        dots.appendChild(stopDot(st, false, s.opp));   // opponent's turn (top)
        dots.appendChild(stopDot(st, true, s.mine));   // your turn (bottom)
        cell.appendChild(dots);
      }
      bar.appendChild(cell);
    });
  }
  function stopDot(st, own, on) {
    const row = el("div", "sdotrow"); // full-width clickable band → easy to hit (not just the dot)
    const side = own ? "YOUR" : "the opponent's";
    row.title = (on ? "Remove stop on " : "Stop on ") + side + " " + st.label + " (get priority there)";
    row.onclick = (e) => { e.stopPropagation(); toggleStop(st.phase, own, !on); };
    row.appendChild(el("div", "sdot" + (own ? " you" : " opp") + (on ? " on" : "")));
    return row;
  }
  function toggleStop(phase, own, on) {
    // LIVE: the server updates the shared per-(step, side) stop config + echoes it; the running
    // game's agent honours it at the next priority window — no game reset. `own` = your turn's copy.
    if (ws) ws.send(JSON.stringify({ type: "setStop", step: phase, own: own, on: on }));
  }

  // Mobile-reflow check — mirrors the `@media (max-width:760px),(max-height:500px)` breakpoint (narrow
  // OR short, so a phone counts in both orientations).
  function isMobile() { return window.matchMedia("(max-width: 760px), (max-height: 500px)").matches; }
  function renderRail() {
    const rail = $("rail");
    rail.innerHTML = "";
    const opp = pub(oppId()), mine = pub(me());
    rail.appendChild(pinfoEl(opp, false));
    const ph = el("div", "phasebar");
    let phHtml = "turn <b>" + view.turn + "</b><br>" + view.phase + "<br>active <b>P" + view.active_player + "</b>";
    // Live stops panel (the seat's actual stop config), once the engine populates view.stops.
    if (view.stops) phHtml += '<br><span class="stopline">' + stopsSummary(view.stops) + "</span>";
    ph.innerHTML = phHtml;
    rail.appendChild(ph);
    // Your player strip: on desktop it lives at the bottom of the left rail; on mobile it's mounted into
    // the sticky bottom sheet (#selfSlot inside .logpanel) so your life/piles ride along with the prompt.
    const selfPanel = pinfoEl(mine, true);
    const slot = document.getElementById("selfSlot");
    if (slot) slot.innerHTML = "";
    if (isMobile() && slot) slot.appendChild(selfPanel);
    else rail.appendChild(selfPanel);
  }

  const STEP_ABBR = { PrecombatMain: "MP1", PostcombatMain: "MP2", DeclareAttackers: "ATK",
    DeclareBlockers: "BLK", Upkeep: "UP", Draw: "DR", BeginCombat: "BC", CombatDamage: "CD",
    EndCombat: "EC", End: "END", Untap: "UN", Cleanup: "CL" };
  function stopsSummary(ss) {
    if (ss.full_control) return "🛑 full control";
    const active = (ss.per_step || []).filter(s => s[1]).map(s => STEP_ABBR[s[0]] || s[0]);
    return "stops: " + (active.length ? active.join(", ") : "—");
  }

  function pinfoEl(p, you) {
    // `.self`/`.opp` let the mobile reflow place your panel by the prompt and the opponent's up top.
    const d = el("div", "pinfo" + (you ? " self" : " opp") + (view.active_player === p.player ? " active" : ""));
    d.dataset.pid = p.player; // target-arrow destination for player-targeting spells
    // If this player is a legal target of the current choice, make the whole panel a click target.
    const pIdx = playerOptIdx(p.player);
    const targeted = pIdx >= 0 && multi.has(pIdx);
    if (pIdx >= 0) {
      d.classList.add(targeted ? "targeted" : "targetable");
      d.title = (targeted ? "Targeted — click to unselect Player " : "Click to target Player ") + p.player;
      d.onclick = () => onOptionToggle(pIdx);
    }
    const who = el("div", "who");
    who.innerHTML = "Player " + p.player + (you ? ' <span class="you">YOU</span>' : "") +
      (targeted ? ' <span class="tgtbadge">🎯 target</span>' : "");
    d.appendChild(who);
    const life = el("div", "life" + (p.life <= 5 ? " low" : ""), "♥ " + p.life);
    d.appendChild(life);
    // Floating (unspent) mana in this player's pool — visible so you can see what's available.
    const pips = poolPips(p.mana_pool || p.manaPool);
    if (pips.length) {
      const mp = el("div", "floatmana");
      mp.title = "Floating mana — " + pips.length + " in pool (empties as steps/phases end)";
      pips.forEach(s => mp.appendChild(s));
      d.appendChild(mp);
    }
    const piles = el("div", "piles");
    const libCount = p.library_count != null ? p.library_count : p.libraryCount;
    const deck = you ? deckView[p.player] : null; // your starting decklist (debug peek)
    // God-view (replay/spectate): the library is fully visible IN ORDER (top = index 0); the hand
    // is face-up. Otherwise the library is hidden and only the viewpoint seat sees its own hand.
    const godLib = godMode && view._god ? p._library : null;
    if (godMode && view._god) {
      piles.appendChild(pileEl("Hand", (p._hand || []).length, p._hand || [], "P" + p.player + " hand", false));
    } else {
      // Normal play: your hand opens face-up; the opponent's hand opens as N card backs (hidden).
      const handCount = p.hand_count != null ? p.hand_count : (p.handCount || 0);
      const handObjs = you ? (view.me.hand || []) : null;
      piles.appendChild(pileEl("Hand", you ? (view.me.hand || []).length : handCount, handObjs, "P" + p.player + " hand", !you));
    }
    const libPile = pileEl("Lib", libCount, godLib, "P" + p.player + " library" + (godLib ? " (top first)" : ""), !godLib);
    if (deck && !godLib) { libPile.classList.add("clk"); libPile.title = "Your starting decklist"; libPile.onclick = (e) => { e.stopPropagation(); openDecklist("P" + p.player + " decklist", deck); }; }
    piles.appendChild(libPile);
    piles.appendChild(pileEl("GY", (p.graveyard || []).length, p.graveyard || [], "P" + p.player + " graveyard", false));
    const ex = p.exile_public || p.exilePublic || [];
    piles.appendChild(pileEl("Exile", ex.length, ex, "P" + p.player + " exile", false));
    d.appendChild(piles);
    return d;
  }

  function pileEl(label, n, objs, title, hidden) {
    const d = el("div", "pile");
    d.innerHTML = '<div class="n">' + n + '</div><div class="l">' + label + '</div>';
    // stopPropagation so opening a zone doesn't also toggle a player-target on the parent panel.
    // Hidden zones (opp hand, your library) open as `n` card backs rather than nothing.
    d.onclick = (e) => { e.stopPropagation(); openZone(title, hidden ? null : (objs || []), hidden ? n : 0); };
    return d;
  }
  // The prompt-option index that targets player `pid` (a "Player N" option with no board object),
  // or -1. Lets the board's player panels act as click targets for player-targeting choices.
  function playerOptIdx(pid) {
    if (!cur) return -1;
    const p = cur.prompt;
    if (p.mode !== "selectMany" && p.mode !== "selectOne") return -1;
    const objs = p.option_objs || p.optionObjs || [];
    for (let i = 0; i < p.options.length; i++) {
      if (objs[i] == null && p.options[i] === ("Player " + pid)) return i;
    }
    return -1;
  }
  // Unified option toggle (used by side-panel buttons AND board player panels) so every view stays
  // in sync: selectMany toggles the pending set + full re-render; single-choice submits immediately.
  function onOptionToggle(i) {
    if (!cur) return;
    const p = cur.prompt;
    if (p.mode === "selectMany") { if (multi.has(i)) multi.delete(i); else multi.add(i); render(); }
    else { send({ picks: [i] }); }
  }

  function renderHalf(elId, pid, isOppo) {
    const host = $(elId);
    host.innerHTML = "";
    if (pid == null) return;
    const perms = bfOf(pid);
    // Auras/Equipment attached to a permanent (its `attachments` list) render BEHIND their host,
    // not as standalone cards — so collect the attached ids and a lookup, and skip them in the rows.
    const byId = {}; perms.forEach(c => byId[c.id] = c);
    const attached = new Set();
    perms.forEach(c => (c.attachments || []).forEach(id => attached.add(id)));
    // Skip creatures pulled into the combat lane (blocked attackers + their blockers, and the rest
    // of the attackers) — they render there instead, and return to the band once combat ends.
    const top = perms.filter(c => !attached.has(c.id) && !engagedIds.has(c.id));
    // Three buckets. Creatures take priority over every other type: an artifact/enchantment/land
    // that is ALSO a creature goes with the creatures (it attacks/blocks). Unknown (no chars,
    // e.g. face-down) defaults to the creature row too. Remaining noncreature permanents split into
    // lands (their own back row) and "others" — noncreature artifacts/enchantments/planeswalkers,
    // which render off to the RIGHT of the creatures in the same band.
    const creatures = top.filter(c => !c.chars || isCreature(c.chars));
    const lands = top.filter(c => c.chars && !isCreature(c.chars) && isLand(c.chars));
    const others = top.filter(c => c.chars && !isCreature(c.chars) && !isLand(c.chars));
    const landRow = zoneRow("lands", lands, byId);
    const creatureRow = creatureBand(creatures, others, byId);
    // opponent: lands back (top), creatures front (near midline). you: creatures front (top), lands back (bottom).
    if (isOppo) { host.appendChild(landRow); host.appendChild(creatureRow); }
    else { host.appendChild(creatureRow); host.appendChild(landRow); }
  }

  function zoneRow(cls, cards, byId) {
    const row = el("div", "row " + cls);
    if (!cards.length) { row.appendChild(el("span", "rowlabel", cls === "lands" ? "lands" : "—")); return row; }
    cards.forEach(c => row.appendChild(permEl(c, byId || {})));
    return row;
  }

  // The creature band: creatures fill from the left; noncreature artifacts/enchantments/walkers sit
  // in a separate group off to the right (divider + right-aligned), so combat permanents stay
  // visually distinct from static/utility ones.
  function creatureBand(creatures, others, byId) {
    const row = el("div", "row creatures");
    if (!creatures.length && !others.length) { row.appendChild(el("span", "rowlabel", "—")); return row; }
    const cg = el("div", "permgroup cg");
    creatures.forEach(c => cg.appendChild(permEl(c, byId || {})));
    row.appendChild(cg);
    if (others.length) {
      const og = el("div", "permgroup og");
      others.forEach(c => og.appendChild(permEl(c, byId || {})));
      row.appendChild(og);
    }
    return row;
  }

  // ── combat lane: blockers move in front of the attacker they block ───────────────
  // `combatByAtk` maps attackerId → [blockerId…] (only once blocks are declared); `engagedIds` is
  // every creature pulled out of its band into the lane. Both are recomputed each render and cleared
  // when combat ends, so creatures snap back to their normal rows afterward.
  let combatByAtk = null, engagedIds = new Set();
  function computeCombat() {
    combatByAtk = null; engagedIds = new Set();
    const c = view && view.combat;
    if (!c || !(c.blockers || []).length) return; // lane only appears once a block exists
    // Only pull creatures that are STILL on the battlefield into the lane — a creature that died in
    // combat is gone, and a SURVIVOR must keep being rendered (in the lane below). Adding a dead-or-
    // alive id blindly is what made survivors-whose-attacker-died vanish until combat cleared.
    const alive = new Set();
    (view.battlefield || []).forEach(o => { if (o.Visible) alive.add(o.Visible.id); });
    combatByAtk = new Map();
    (c.blockers || []).forEach(pr => {            // pr = [blocker, attacker]
      const bl = pr[0], atk = pr[1];
      if (!combatByAtk.has(atk)) combatByAtk.set(atk, []);
      combatByAtk.get(atk).push(bl);
      if (alive.has(bl)) engagedIds.add(bl);      // surviving blockers
    });
    (c.attackers || []).forEach(a => { if (alive.has(a[0])) engagedIds.add(a[0]); }); // surviving attackers
  }
  function renderCombatLane() {
    const host = $("combatLane");
    host.innerHTML = "";
    if (!combatByAtk || !view.combat) { host.hidden = true; return; }
    const allById = {}; (view.battlefield || []).map(norm).forEach(o => { allById[o.id] = o; });
    // One cell per declared attacker, rendering whoever SURVIVED. If the attacker died but a blocker
    // lived, the cell still shows the surviving blocker (so it never disappears); skip a matchup only
    // when nothing on either side survives.
    let any = false;
    (view.combat.attackers || []).forEach(a => {
      const atk = allById[a[0]] || null; // may have died in combat
      const blks = (combatByAtk.get(a[0]) || []).map(id => allById[id]).filter(Boolean); // survivors
      if (!atk && !blks.length) return;
      host.appendChild(matchupCell(atk, blks, allById));
      any = true;
    });
    host.hidden = !any;
  }
  // One attacker and the creatures blocking it, stacked so they face off across a ⚔. The attacker
  // sits toward its own controller's side (opponent on top, you on the bottom) — mirroring the board
  // — so a blocker visibly stands in front of the attacker it's stopping. Unblocked attackers stand
  // alone with an arrow toward the player they're hitting.
  function matchupCell(atk, blks, allById) {
    const cell = el("div", "matchup" + (blks.length ? "" : " unblocked"));
    if (!atk) { // attacker died in combat → show the surviving blocker(s) on their own
      const blkRow = el("div", "matchrow blk");
      blks.forEach(b => blkRow.appendChild(permEl(b, allById)));
      cell.appendChild(blkRow);
      return cell;
    }
    const atkMine = atk.controller === view.seat;
    const atkRow = el("div", "matchrow atk"); atkRow.appendChild(permEl(atk, allById));
    if (blks.length) {
      const blkRow = el("div", "matchrow blk");
      blks.forEach(b => blkRow.appendChild(permEl(b, allById)));
      const vs = el("div", "vs", "⚔");
      if (atkMine) { cell.appendChild(blkRow); cell.appendChild(vs); cell.appendChild(atkRow); }
      else { cell.appendChild(atkRow); cell.appendChild(vs); cell.appendChild(blkRow); }
    } else {
      const thru = el("div", "vs through", atkMine ? "↑ unblocked" : "↓ unblocked");
      if (atkMine) { cell.appendChild(thru); cell.appendChild(atkRow); }
      else { cell.appendChild(atkRow); cell.appendChild(thru); }
    }
    return cell;
  }

  // A battlefield permanent plus any auras/equipment attached to it, stacked slightly offset
  // behind it (CR 303/301 attachments). Returns just the card when there are no attachments.
  function permEl(c, byId) {
    const atts = (c.attachments || []).map(id => byId[id]).filter(Boolean);
    const card = cardEl(c, { interactive: true });
    if (!atts.length) return card;
    const wrap = el("div", "attachwrap");
    // Attached cards sit behind, each nudged UP and to the LEFT so its top (name) peeks out above
    // the host — and the host's own name stays fully visible on top.
    atts.forEach((a, i) => {
      const ac = cardEl(a, { interactive: true, attach: true });
      ac.style.left = (-(i + 1) * 15) + "px";
      ac.style.top = (-(i + 1) * 19) + "px";
      ac.style.zIndex = String(i + 1);
      wrap.appendChild(ac);
    });
    card.style.position = "relative";
    card.style.zIndex = String(atts.length + 1);
    wrap.appendChild(card);
    // Reserve room (top + left) for the peeking attachments so they aren't clipped or overlapping.
    wrap.style.marginLeft = (atts.length * 15) + "px";
    wrap.style.marginTop = (atts.length * 19) + "px";
    return wrap;
  }

  function renderStack() {
    const s = $("stack");
    s.innerHTML = "";
    (view.stack || []).forEach(it => {
      const card = cardEl({ id: it.id, chars: stackChars(it) }, { onStack: true });
      if (isAbilityStack(it)) card.classList.add("ability");
      card.dataset.sid = it.id; // target-arrow source (stack id space, distinct from object ids)
      s.appendChild(card);
    });
  }
  // A triggered/activated ability on the stack: the engine projects it with an empty "Ability"
  // chars (no grp_id), but it carries `source` (the permanent it came from). Surface THAT card's
  // name + oracle text + art — the right detail for the current one-ability-per-card pool. (The
  // precise per-ability text would be an engine-side effect formatter; this is the faithful view
  // we can build from what's exposed.)
  function isAbilityStack(it) {
    const c = it.chars || {};
    return !c.grp_id || c.name === "Ability";
  }
  function stackChars(it) {
    if (!isAbilityStack(it)) return it.chars;
    const src = it.source != null ? findVisibleChars(it.source) : null;
    if (!src) return it.chars; // source not in a visible zone (rare) → leave as "Ability"
    return { name: src.name, card_types: ["Ability"], subtypes: [], supertypes: [],
      colors: src.colors || [], mana_value: 0, rules_text: src.rules_text || "",
      keywords: [], grp_id: src.grp_id };
  }
  function findVisibleChars(id) {
    const me = view.me || {};
    const zones = [view.battlefield, me.hand, me.revealed_to_me, me.known_library];
    (view.players || []).forEach(p => zones.push(p.graveyard, p.exile_public || p.exilePublic, p._hand, p._library));
    for (const z of zones) {
      for (const o of (z || [])) if (o && o.Visible && o.Visible.id === id) return o.Visible.chars;
    }
    return null;
  }
  // An option button. When the option refers to a real card (resolvable in the view — incl. Search
  // candidates now revealed in me.revealed_to_me), show its art thumbnail + name as a card tile.
  function optButton(i, label, objId) {
    const chars = objId != null ? findVisibleChars(objId) : null;
    const grp = chars && chars.grp_id;
    const b = el("button", "opt" + (multi.has(i) ? " sel" : "") + (grp ? " optcard" : ""));
    if (grp) {
      const info = artMap[grp];
      if (info && info.art) { const t = el("div", "optart"); t.style.backgroundImage = "url('" + info.art + "')"; b.appendChild(t); }
      b.appendChild(el("span", "optname", chars.name || label));
    } else {
      b.textContent = label;
    }
    b.onclick = () => onOptionToggle(i);
    return b;
  }

  function renderHand() {
    const h = $("hand");
    h.innerHTML = "";
    const lab = el("div", "hlabel", "hand");
    h.appendChild(lab);
    (view.me.hand || []).forEach(o => h.appendChild(cardEl(norm(o), { interactive: true, hand: true })));
    if (!(view.me.hand || []).length) h.appendChild(el("span", "waiting", "(empty hand)"));
    // God-view (replay / spectate): render the opponent's hand face-up at the top, too.
    const oh = $("oppHand");
    if (godMode && view._god) {
      oh.hidden = false; oh.innerHTML = "";
      oh.appendChild(el("div", "hlabel", "opp hand"));
      const opp = (view.players || []).find(p => p.player !== view.seat);
      const cards = (opp && opp._hand) || [];
      cards.forEach(o => oh.appendChild(cardEl(norm(o), { hand: true })));
      if (!cards.length) oh.appendChild(el("span", "waiting", "(empty)"));
    } else {
      oh.hidden = true;
    }
  }

  // ── card frame ───────────────────────────────────────────────────────
  function cardEl(c, ctx) {
    ctx = ctx || {};
    if (c.hidden) { const b = el("div", "card back"); return b; }
    const chars = c.chars || {};
    const idxs = ctx.interactive ? legalIdxs(c.id) : [];
    const idx = idxs.length ? idxs[0] : -1;
    const selected = ctx.interactive && idx >= 0 && multi.has(idx);
    const d = el("div", ["card", colorClass(chars), c.tapped ? "tapped" : "", c.sick ? "sick" : "",
      idx >= 0 ? "legal" : "", selected ? "selected" : "", ctx.attach ? "attach" : "",
      ctx.hand ? "" : (ctx.onStack ? "" : "")].filter(Boolean).join(" "));
    if (c.id != null) d.dataset.oid = c.id; // for target arrows + attachment lookup

    const hdr = el("div", "c-hdr");
    hdr.appendChild(el("div", "c-name", chars.name || "—"));
    const mana = el("div", "c-mana");
    manaPips(chars).forEach(p => mana.appendChild(p));
    hdr.appendChild(mana);
    d.appendChild(hdr);

    // Dev quality reminder: engine flags a card whose printed text is only partially modeled.
    // (Forward-compatible: only shows when the view explicitly says `fully_implemented === false`.)
    if (chars.fully_implemented === false) {
      d.classList.add("partial");
      const warn = el("div", "warnbadge", "⚠");
      warn.title = "Not fully implemented" + (chars.rules_text ? ":\n" + chars.rules_text : "");
      d.appendChild(warn);
    }

    const art = el("div", "c-art");
    const info = artMap[chars.grp_id];
    if (info && info.art) {
      art.style.backgroundImage = "url('" + info.art + "')";
      art.style.backgroundSize = "cover";
    }
    d.appendChild(art);
    // Hover → full card image preview. Stored as a data-attr and resolved by the global pointer
    // tracker (`refreshPreview`) rather than per-element mouseenter/leave listeners — so when the
    // board re-renders and this element is replaced out from under the cursor, the preview can't
    // get orphaned/stuck open (the tracker re-derives what's under the pointer every frame).
    if (info && info.img) d.dataset.preview = info.img;
    d.appendChild(el("div", "c-type", typeLine(chars)));
    const rules = el("div", "c-rules");
    // Computed keywords (incl. layer-granted, e.g. Flying from Levitation) bold on top, then text.
    const kw = chars.keywords || [];
    let rulesHtml = kw.length ? "<b>" + esc(kw.join(", ")) + "</b>" : "";
    if (chars.rules_text) rulesHtml += (rulesHtml ? "<br>" : "") + renderText(chars.rules_text);
    rules.innerHTML = rulesHtml;
    d.appendChild(rules);
    if (chars.power != null) d.appendChild(el("div", "c-pt", chars.power + "/" + chars.toughness));

    // combat / damage badges
    if (view.combat) {
      if ((view.combat.attackers || []).some(a => a[0] === c.id)) d.appendChild(el("div", "badge atk", "ATK"));
      if ((view.combat.blockers || []).some(b => b[0] === c.id)) d.appendChild(el("div", "badge blk", "BLK"));
    }
    if (c.dmg > 0) d.appendChild(el("div", "badge dmg", c.dmg + "✶"));
    const cc = (c.counters && c.counters.counts) || {};
    const ck = Object.keys(cc);
    if (ck.length) {
      const wrap = el("div", "ctrs");
      ck.forEach(k => wrap.appendChild(el("span", "ctr", counterLabel(k) + "×" + cc[k])));
      d.appendChild(wrap);
    }

    if (idxs.length) d.onclick = (e) => onCardClick(idxs, e);
    return d;
  }
  function counterLabel(k) { return ({ PlusOnePlusOne: "+1/+1", MinusOneMinusOne: "−1/−1" })[k] || k; }

  function colorClass(chars) {
    if (isLand(chars)) return "land";
    const cols = chars.colors || [];
    if (cols.length > 1) return "multi";
    if (cols.length === 1) return ({ White: "w", Blue: "u", Black: "b", Red: "r", Green: "g" })[cols[0]] || "colorless";
    return "colorless";
  }

  function typeLine(chars) {
    const sup = (chars.supertypes || []).join(" ");
    const types = (chars.card_types || chars.cardTypes || []).join(" ");
    const sub = (chars.subtypes || []).join(" ");
    let s = [sup, types].filter(Boolean).join(" ");
    if (sub) s += " — " + sub;
    return s || "—";
  }

  const WUBRG = ["White", "Blue", "Black", "Red", "Green", "Colorless"];
  const CODE = { White: "W", Blue: "U", Black: "B", Red: "R", Green: "G", Colorless: "C" };
  // A real Magic mana/cost symbol from Scryfall's official SVG set.
  function symImg(code, cls) {
    const i = el("img", "ms" + (cls ? " " + cls : ""));
    i.src = "https://svgs.scryfall.io/card-symbols/" + code + ".svg";
    i.alt = "{" + code + "}"; i.loading = "lazy";
    return i;
  }
  function manaPips(chars) {
    if (isLand(chars)) return [];
    const out = [];
    const mc = chars.mana_cost; // exact structured cost when the view carries it
    if (mc) {
      const colored = mc.colored || {};
      const totalC = Object.values(colored).reduce((a, b) => a + b, 0);
      if (mc.generic > 0 || (mc.generic === 0 && totalC === 0)) out.push(symImg(String(mc.generic)));
      WUBRG.forEach(c => { const n = colored[c] || 0; for (let i = 0; i < n; i++) out.push(symImg(CODE[c])); });
      return out;
    }
    // No structured mana cost in the view → the card has NO cost (a token, an ability on the stack,
    // or a genuinely costless card like Living End) and shows NOTHING — which is distinct from a real
    // {0} (that arrives as mana_cost {generic:0} and renders "0" above). Only approximate from CMC if
    // the view actually implies a positive cost (defensive; current views always carry mana_cost).
    const cmc = chars.mana_value != null ? chars.mana_value : (chars.manaValue || 0);
    if (cmc <= 0) return out; // no cost → no pips (NOT a "0")
    const cols = chars.colors || [];
    const generic = Math.max(0, cmc - cols.length);
    if (generic > 0) out.push(symImg(String(generic)));
    cols.forEach(c => out.push(symImg(CODE[c] || "C")));
    return out;
  }
  // Floating mana in a player's pool → real mana symbols (one per mana, by colour).
  function poolPips(pool) {
    const out = [];
    const amts = (pool && pool.amounts) || {};
    WUBRG.forEach(c => { const n = amts[c] || 0; for (let i = 0; i < n; i++) out.push(symImg(CODE[c])); });
    return out;
  }
  // Replace {T}/{G}/… tokens in oracle text with their Scryfall symbol SVGs.
  function renderText(text) {
    return esc(text).replace(/\{([^}]+)\}/g, (m, code) => {
      const c = code.toUpperCase().replace(/\//g, "");
      return '<img class="ms ms-text" src="https://svgs.scryfall.io/card-symbols/' + c + '.svg" alt="' + esc(m) + '">';
    });
  }
  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

  // ── click-to-act ───────────────────────────────────────────────────────
  function onCardClick(idxs, e) {
    if (!cur || !idxs || !idxs.length) return;
    const mode = cur.prompt.mode;
    if (mode === "selectMany") {
      const i = idxs[0];
      if (multi.has(i)) multi.delete(i); else multi.add(i);
      render(); renderPrompt();
      return;
    }
    // action / selectOne: one option → act immediately; several options on the same card (e.g.
    // Normal + Warp / any alt-cost cast) → pop a small menu so the player chooses the variant.
    if (idxs.length === 1) { send({ picks: [idxs[0]] }); return; }
    showVariantMenu(idxs, e);
  }

  // A small popup anchored at the click, one button per legal option on the clicked card. Used when
  // a card has multiple cast variants (the engine pre-enumerated each as its own action).
  function closeVariantMenu() { const m = $("varmenu"); if (m) m.remove(); }
  function showVariantMenu(idxs, e) {
    closeVariantMenu();
    const opts = cur.prompt.options || [];
    const menu = el("div", "varmenu"); menu.id = "varmenu";
    menu.appendChild(el("div", "varhdr", "Choose how to cast"));
    idxs.forEach(i => {
      const b = el("button", "varitem", opts[i] || ("Option " + i));
      b.onclick = (ev) => { ev.stopPropagation(); closeVariantMenu(); send({ picks: [i] }); };
      menu.appendChild(b);
    });
    document.body.appendChild(menu);
    const x = (e && e.clientX != null) ? e.clientX : 80, y = (e && e.clientY != null) ? e.clientY : 80;
    const r = menu.getBoundingClientRect();
    menu.style.left = Math.max(6, Math.min(x, window.innerWidth - r.width - 8)) + "px";
    menu.style.top = Math.max(6, Math.min(y, window.innerHeight - r.height - 8)) + "px";
    // Dismiss on the next outside click or Escape (defer so this same click doesn't close it).
    setTimeout(() => {
      document.addEventListener("click", closeVariantMenu, { once: true });
      document.addEventListener("keydown", function esc(k) {
        if (k.key === "Escape") { closeVariantMenu(); document.removeEventListener("keydown", esc); }
      });
    }, 0);
  }

  // ── prompt panel (non-card options + controls) ─────────────────────────
  function renderPrompt() {
    closeVariantMenu(); // a fresh prompt invalidates any open cast-variant menu
    const p = cur.prompt;
    const root = $("prompt");
    root.innerHTML = "";
    root.appendChild(el("div", "title", p.title));
    const objs = p.option_objs || p.optionObjs || [];

    if (p.mode === "number") {
      const inp = el("input"); inp.type = "number"; inp.min = p.numMin; inp.max = p.numMax; inp.value = p.numMin;
      root.appendChild(inp);
      root.appendChild(hint("Enter " + p.numMin + "–" + p.numMax + "."));
      addActions(root, [actBtn("Submit", () => send({ number: clamp(parseInt(inp.value || "0", 10), p.numMin, p.numMax) }))]);
      return;
    }
    if (p.mode === "order") {
      const opts = el("div", "opts");
      p.options.forEach((label, i) => {
        const pos = orderSeq.indexOf(i);
        const b = el("button", "opt" + (pos >= 0 ? " sel" : ""), (pos >= 0 ? "[" + (pos + 1) + "] " : "") + label);
        b.onclick = () => { if (pos >= 0) orderSeq.splice(pos, 1); else orderSeq.push(i); renderPrompt(); };
        opts.appendChild(b);
      });
      root.appendChild(opts);
      root.appendChild(hint("Click in resolution order (first clicked resolves first)."));
      const sub = actBtn("Submit order", () => send({ order: orderSeq.slice() }));
      sub.disabled = orderSeq.length !== p.options.length;
      addActions(root, [sub, passBtn("Reset", () => { orderSeq = []; renderPrompt(); })]);
      return;
    }

    // Multi-slot target choice (e.g. Bushwhack-fight: slot 0 = a creature you control, slot 1 = one
    // you don't). Render each slot as its own group + enforce each slot's count independently.
    const slots = p.targetSlots || p.target_slots || [];
    if (slots.length) {
      slots.forEach(slot => {
        const sec = el("div", "slotgroup");
        sec.appendChild(el("div", "slothdr", slot.description +
          (slot.min === slot.max ? " — pick " + slot.min : " — " + slot.min + "–" + slot.max)));
        const sopts = el("div", "opts");
        let boardN = 0;
        for (let i = slot.start; i < slot.start + slot.len; i++) {
          if (objs[i] != null && document.querySelector('[data-oid="' + objs[i] + '"]')) { boardN++; continue; }
          sopts.appendChild(optButton(i, p.options[i], objs[i]));
        }
        sec.appendChild(sopts);
        if (boardN) sec.appendChild(hint("→ click the highlighted card(s) on the board"));
        root.appendChild(sec);
      });
      if (multi.size) root.appendChild(el("div", "chosen", "🎯 Chosen: " +
        [...multi].sort((a, b) => a - b).map(i => p.options[i]).join(", ")));
      const sub = actBtn("Submit", () => send({ picks: [...multi].sort((a, b) => a - b) }));
      sub.disabled = !slots.every(s => {
        const c = [...multi].filter(i => i >= s.start && i < s.start + s.len).length;
        return c >= s.min && c <= s.max;
      });
      const acts2 = [sub];
      if (p.canPass) acts2.push(passBtn("Pass", () => send({ pass: true })));
      addActions(root, acts2);
      return;
    }

    // Render a button for every option EXCEPT those whose object is actually rendered on the board
    // (those are clicked on the card). An option with an object that isn't on the board — e.g. a
    // library card offered by a Search (Erode/Bushwhack/Worldwagon) — still needs a button, else
    // there's no way to pick it.
    const opts = el("div", "opts");
    let boardCount = 0;
    p.options.forEach((label, i) => {
      const onBoard = objs[i] != null && document.querySelector('[data-oid="' + objs[i] + '"]');
      if (onBoard) { boardCount++; return; }
      opts.appendChild(optButton(i, label, objs[i]));
    });
    root.appendChild(opts);
    if (boardCount) root.appendChild(hint("→ click the highlighted cards / players on the board" + (p.mode === "selectMany" ? " to select" : "") + "."));

    // Show exactly what's chosen so far (board cards + player/side-panel options).
    if (p.mode === "selectMany" && multi.size) {
      const chosen = [...multi].sort((a, b) => a - b).map(i => p.options[i]).join(", ");
      root.appendChild(el("div", "chosen", "🎯 Chosen: " + chosen));
    }

    const acts = [];
    if (p.mode === "selectMany") {
      const sel = multi.size;
      const sub = actBtn("Submit (" + sel + ")", () => send({ picks: [...multi].sort((a, b) => a - b) }));
      sub.disabled = sel < p.min || sel > p.max;
      acts.push(sub);
    }
    if (p.canPass) acts.push(passBtn("Pass", () => send({ pass: true })));
    // At a priority window, offer the on-screen "pass through this turn's stops" hold next to Pass.
    if (isPriorityPrompt(p)) acts.push(passTurnBtn());
    if (acts.length) addActions(root, acts);
  }
  function addActions(root, btns) { const r = el("div", "actions"); btns.forEach(b => r.appendChild(b)); root.appendChild(r); }
  function actBtn(t, fn) { const b = el("button", "act", t); b.onclick = fn; return b; }
  function passBtn(t, fn) { const b = el("button", "pass", t); b.onclick = fn; return b; }
  // "Pass turn": on-screen equivalent of the Enter key — hold through this turn's remaining priority
  // stops. Shows a held state when engaged; tap again (or Esc) to cancel. Rendered at priority windows.
  function passTurnBtn() {
    const on = autoPassEngaged();
    const b = el("button", "pass passturn" + (on ? " held" : ""), on ? "Holding turn" : "⏩ Pass turn");
    b.title = "Pass through this turn's remaining stops (same as Enter). Tap again to cancel.";
    b.onclick = () => { toggleAutoPass(); if (cur) renderPrompt(); };
    return b;
  }

  function renderEnd(winner) {
    const w = (winner == null) ? "draw" : ("Player " + winner);
    const youWon = view && winner === view.seat;
    $("prompt").innerHTML = '<div class="banner">Game over — winner: ' + w + (youWon ? " 🎉 (you!)" : "") + "</div>";
    log("GAME OVER — winner: " + w);
  }

  // ── zone viewer modal ──────────────────────────────────────────────────
  function openZone(title, objs, backs) {
    const g = $("modalGrid"); g.innerHTML = "";

      // Hidden zone: show one generic card back per card (the count is known even if contents aren't).
      const n = backs || 0;
      $("modalTitle").textContent = title + " (" + n + (n ? " · hidden" : "") + ")";
      if (n > 0) { for (let i = 0; i < n; i++) g.appendChild(el("div", "card back")); }
      else { g.innerHTML = '<div class="waiting">This zone is hidden — its contents aren\'t in your view.</div>'; }
