  }
  // ── hover full-card preview ──────────────────────────────────────────────
  function showPreview(url, ev) { const p = $("preview"); p.src = url; p.style.display = "block"; positionPreview(ev); }
  function hidePreview() { $("preview").style.display = "none"; }
  function positionPreview(ev) {
    const p = $("preview"), w = 320, h = 446;
    let x = ev.clientX + 22, y = ev.clientY - h / 2;
    if (x + w > window.innerWidth) x = ev.clientX - w - 22;
    y = Math.max(8, Math.min(y, window.innerHeight - h - 8));
    p.style.left = x + "px"; p.style.top = y + "px";
  }
  // Global pointer tracking: the single source of truth for what the preview shows. We re-derive
  // the element under the cursor (`elementFromPoint`) on every move AND after every render, so a
  // card replaced/removed under a stationary cursor can never leave a stale preview on screen.
  // (`#preview` is `pointer-events:none`, so it never shadows the card beneath it.)
  let ptrX = -1, ptrY = -1;
  function refreshPreview() {
    if (ptrX < 0) return;
    const t = document.elementFromPoint(ptrX, ptrY);
    const card = t && t.closest ? t.closest("[data-preview]") : null;
    const url = card && card.dataset ? card.dataset.preview : null;
    if (url) showPreview(url, { clientX: ptrX, clientY: ptrY });
    else hidePreview();
  }
  // The hover preview is a MOUSE-ONLY affordance (covers board/hand/stack AND the zone/decklist modal
  // grids). On touch, a tap emits emulated mouse events (iOS Safari fires mousemove before click), which
  // used to open this preview on every tap — and with no mouseleave on touch it never dismissed, blocking
  // the UI. So we drive it from pointer events and ignore anything that isn't a real mouse: touch/pen get
  // NO hover preview at all (the long-press overlay below is their only way to inspect a card).
  document.addEventListener("pointermove", (e) => {
    if (e.pointerType !== "mouse") return;
    ptrX = e.clientX; ptrY = e.clientY; refreshPreview();
  }, true);
  // Cursor leaves the document entirely (e.g. out the top of the window) → drop the preview.
  // Real mouse cursor leaves the document entirely (e.g. out the top of the window) → drop the preview.
  document.addEventListener("pointerout", (e) => {
    if (e.pointerType !== "mouse") return;
    if (!e.relatedTarget) { ptrX = ptrY = -1; hidePreview(); }
  });

  // ── long-press full-card preview (touch) ───────────────────────────────────────
  // Desktop keeps the hover preview (#preview) untouched. On touch, a ~450ms hold on any previewable
  // card (hand / battlefield / stack) opens a centered overlay AND cancels the pending tap, so you can
  // inspect a legal card without firing its game action. Tap outside / ✕ closes it.
  const LP_MS = 450, LP_MOVE = 12;
  let lpTimer = null, lpX = 0, lpY = 0, suppressClick = false;
  function lpClear() { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }
  function showOverlayPreview(url) {
    let ov = document.getElementById("previewOverlay");
    if (!ov) {
      ov = el("div", "preview-overlay"); ov.id = "previewOverlay";
      const img = el("img"); img.id = "previewOverlayImg"; img.alt = "card preview";
      ov.appendChild(img); ov.appendChild(el("div", "preview-close", "✕"));
      ov.addEventListener("click", hideOverlayPreview); // tap outside / on ✕ closes
      document.body.appendChild(ov);
    }
    document.getElementById("previewOverlayImg").src = url;
    ov.classList.add("show");
    hidePreview(); // clear any hover preview underneath
  }
  function hideOverlayPreview() { const ov = document.getElementById("previewOverlay"); if (ov) ov.classList.remove("show"); }
  document.addEventListener("pointerdown", (e) => {
    suppressClick = false; lpClear();
    if (e.pointerType === "mouse") return;                     // mouse keeps hover-preview; touch/pen only
    const t = e.target;
    const card = t && t.closest ? t.closest("[data-preview]") : null;
    if (!card) return;
    lpX = e.clientX; lpY = e.clientY;
    const url = card.dataset.preview;
    lpTimer = setTimeout(() => { lpTimer = null; suppressClick = true; showOverlayPreview(url); }, LP_MS);
  }, true);
  document.addEventListener("pointermove", (e) => {
    if (lpTimer && (Math.abs(e.clientX - lpX) > LP_MOVE || Math.abs(e.clientY - lpY) > LP_MOVE)) lpClear();
  }, true);
  document.addEventListener("pointerup", lpClear, true);
  document.addEventListener("pointercancel", lpClear, true);
  // Eat the click that follows a long-press so the card's game action doesn't fire.
  document.addEventListener("click", (e) => {

  }, true);

  document.addEventListener("contextmenu", (e) => {

  }, true);

  // ── stack → target arrows ─────────────────────────────────────────────────
  const SVGNS = "http://www.w3.org/2000/svg";

  const ARROW_DEFS =
    '<defs><marker id="arrowhead" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto">' +
    '<path d="M0,0 L8,3 L0,6 Z" fill="#ff5a5a"/></marker></defs>';
  function targetEl(t) {
    if (t == null) return null;
    if (t.Player != null) return document.querySelector('[data-pid="' + t.Player + '"]');
    if (t.Object != null) return document.querySelector('.half [data-oid="' + t.Object + '"], .attachwrap [data-oid="' + t.Object + '"]');
    if (t.Stack != null) return document.querySelector('[data-sid="' + t.Stack + '"]');

  function centerOf(elm) { const r = elm.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; }
  function drawArrows() {
    const svg = $("arrows");
    svg.innerHTML = ARROW_DEFS;
    const stack = (view && view.stack) || [];
    stack.forEach(st => {
      const fromEl = document.querySelector('[data-sid="' + st.id + '"]');
      if (!fromEl) return;
      const a = centerOf(fromEl);
      (st.targets || []).forEach(t => {
        const toEl = targetEl(t);
        if (!toEl) return;
        const b = centerOf(toEl);
        // Quadratic curve bowed perpendicular to the line, so multiple arrows don't overlap.
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
        const bow = Math.min(60, len * 0.22);
        const cx = mx - (dy / len) * bow, cy = my + (dx / len) * bow;
        const path = document.createElementNS(SVGNS, "path");
        path.setAttribute("d", "M" + a.x + "," + a.y + " Q" + cx + "," + cy + " " + b.x + "," + b.y);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", "#ff5a5a");
        path.setAttribute("stroke-width", "2.5");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("opacity", "0.9");
        path.setAttribute("marker-end", "url(#arrowhead)");
        svg.appendChild(path);
        // A small dot at the source so it reads as "from here".
        const dot = document.createElementNS(SVGNS, "circle");
        dot.setAttribute("cx", a.x); dot.setAttribute("cy", a.y); dot.setAttribute("r", "3");
        dot.setAttribute("fill", "#ff5a5a");
        svg.appendChild(dot);
      });
    });
  }
  // Reposition arrows when the layout shifts (the board itself re-renders via render()).
  // On resize/rotation re-run render so the player strip re-homes between the left rail (desktop) and
  // the sticky bottom sheet (mobile), then redraw the target arrows against the new layout.
  window.addEventListener("resize", () => { homeReplayBar(); if (view) render(); else drawArrows(); });
  window.addEventListener("scroll", drawArrows, true);

  function eventText(ev) {
    const k = Object.keys(ev)[0], v = ev[k];
    switch (k) {
      case "PhaseBegan": case "Revealed": return null; // (top bar already shows turn/phase)
      case "DrewCards": return "P" + v.player + " draws " + v.count;
      case "LifeChanged": return "P" + v.player + " life " + (v.delta >= 0 ? "+" : "") + v.delta + " → " + v.new_total;
      case "DamageDealt": return "⚔ " + nameOf(v.source) + " deals " + v.amount + " to " + tgtName(v.target);
      case "SpellCast": return "P" + v.controller + " casts " + stackName(v.spell) + stackTgtSuffix(v.spell);
      case "ObjectMoved": return nameOf(v.obj) + " → " + v.to;
      case "PermanentDied": return "💀 " + nameOf(v.obj) + " dies";
      case "ValueChosen": return "P" + v.player + " " + v.label + " = " + v.value;
      case "GameEnded": return "GAME OVER — winner " + (v.winner == null ? "draw" : "P" + v.winner);
      default: return k + " " + JSON.stringify(v);
    }
  }
  function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }
  function hint(t) { return el("div", "hint", t); }
  function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, isNaN(n) ? lo : n)); }
  function log(line) { const d = $("log"); d.textContent += line + "\n"; d.scrollTop = d.scrollHeight; }

  // ── keyboard shortcuts (MTGA-style; see ../mtga-re/docs/priority_stops.md) ────────────────────
  // Space = pass priority / take the sole default action. Enter = pass through ALL of this turn's
  // remaining priority stops at once (mirrors the GRE's PerformActionResp.autoPassPriority=Yes /
  // AutoPassOption.Turn — a per-turn hold that lapses next turn). Esc cancels the hold.
  let autoPassTurn = null; // turn number we're holding "pass" through (null = not engaged)
  function isPriorityPrompt(p) { return !!p && p.mode === "action" && p.canPass; }
  function autoPassEngaged() { return autoPassTurn !== null && view && view.turn === autoPassTurn; }

  // (The web stop policy now lives entirely in the engine's `should_auto_pass` — it surfaces only the
  // real stop windows, so every `decide` we receive IS a stop. The old client-side `priorityAutoPass`
  // narrowing over a forced superset is gone; we just render what the engine sends.)
  function autoPassBadge() {
    let b = $("autopassBadge");
    if (!b) { b = el("div", "autopass-badge"); b.id = "autopassBadge"; document.body.appendChild(b); }
    b.textContent = "Passing this turn's stops — Enter or Esc to cancel";
    b.style.display = autoPassTurn !== null ? "block" : "none";
  }
  function spacePass() {
    if (!cur) return;
    const p = cur.prompt;
    // 1) A valid in-progress selection → accept/submit it (e.g. declare attackers, targets).
    if (p.mode === "selectMany") {
      const n = multi.size;
      if (n >= p.min && n <= p.max) { send({ picks: [...multi].sort((a, b) => a - b) }); return; }
      if (p.canPass) { send({ pass: true }); return; }
      return;                                                          // selection not yet valid → wait
    }
    if (p.mode === "order") { if (orderSeq.length === p.options.length) send({ order: orderSeq.slice() }); return; }
    if (p.mode === "number") {
      const inp = document.querySelector("#prompt input");
      if (inp) send({ number: clamp(parseInt(inp.value || "0", 10), p.numMin, p.numMax) });
      return;
    }
    // 2) Priority / optional → pass (the default action).
    if (p.canPass) { send({ pass: true }); return; }
    // 3) A single forced option → take it.
    if ((p.mode === "action" || p.mode === "selectOne") && (p.options || []).length === 1) send({ picks: [0] });
  }
  function toggleAutoPass() {
    if (!view) return;
    if (autoPassTurn === view.turn) { autoPassTurn = null; autoPassBadge(); return; } // pressed again → off
    autoPassTurn = view.turn; autoPassBadge();
    if (cur && isPriorityPrompt(cur.prompt)) send({ pass: true });    // pass the open window now; chain continues
  }
  window.addEventListener("keydown", (e) => {
    if ($("modal").classList.contains("show")) { if (e.key === "Escape") $("modal").classList.remove("show"); return; }
    const tag = e.target && e.target.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA") return;                 // don't hijack number entry / text fields
    // Replay mode: Space = play/pause, ←/→ = step a frame.
    if (replayId) {
      if (e.code === "Space" || e.key === " ") { e.preventDefault(); togglePlay(); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); stepReplay(-1); }
      else if (e.key === "ArrowRight") { e.preventDefault(); stepReplay(1); }
      return;
    }
    if (e.code === "Space" || e.key === " ") { e.preventDefault(); spacePass(); }
    else if (e.key === "Enter") { e.preventDefault(); toggleAutoPass(); }
    else if (e.key === "Escape") { if (autoPassTurn !== null) { autoPassTurn = null; autoPassBadge(); } }
  });
})();
</script>
</body>
</html>
